name: Build Test Artifacts
on:
  push:
    branches:
      - main*
    paths-ignore:
      - '**/*.md'
      - 'NOTICE'
      - 'THIRD-PARTY'
      - 'LICENSE'
      - '.github/**'
      - '!.github/workflows/build-test-artifacts.yml'
      - '!.github/workflows/integration-test.yml'
      - '!.github/workflows/application-signals-e2e-test.yml'
  schedule:
    - cron: '0 11 * * 1,2,3,4,5' # Every day at 11:00 UTC on Monday to Friday
  workflow_dispatch:
    inputs:
      run-tests:
        description: "Run test workflows after build"
        default: true
        type: boolean
  workflow_call:
    inputs:
      run-tests:
        description: "Run test workflows after build"
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  BuildAndUpload:
    uses: ./.github/workflows/test-build.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET }}

  BuildAndUploadPackages:
    uses: ./.github/workflows/test-build-packages.yml
    needs: [BuildAndUpload]
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET }}

  # BuildDocker is misnamed: in addition to building the Docker images for
  # ECS/EKS tests, this workflow's MakeMSIZip + BuildMSI-2022 jobs are what
  # actually produce the Windows .msi at the top of the S3 packaging prefix.
  # Without this, the EC2 Windows test's `aws s3 cp .../amazon-cloudwatch-agent.msi`
  # has no MSI to grab and msiexec runs against a missing/bogus file.
  BuildDocker:
    needs: [BuildAndUpload]
    uses: ./.github/workflows/test-build-docker.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      ContainerRepositoryNameAndTag: "cwagent-integration-test:${{ github.sha }}"
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"

  StartIntegrationTests:
    needs: [ BuildAndUploadPackages, BuildDocker ]
    if: ${{ github.event_name == 'push' || inputs.run-tests }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - run: gh workflow run integration-test.yml --ref ${{ github.ref_name }} --repo $GITHUB_REPOSITORY -f build_run_id=${{ github.run_id }} -f build_sha=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
