name: Build Test Artifacts
on:
  push:
    branches:
      - main*
    paths:
      # Source code
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'CWAGENT_VERSION'
      # Build and packaging
      - 'Dockerfile*'
      - 'packaging/**'
      - 'msi/**'
      - 'amazon-cloudwatch-container-insights/**'
      # Source directories
      - 'cmd/**'
      - 'cfg/**'
      - 'extension/**'
      - 'internal/**'
      - 'metric/**'
      - 'plugins/**'
      - 'receiver/**'
      - 'processor/**'
      - 'exporter/**'
      - 'service/**'
      - 'tool/**'
      - 'translator/**'
      # CI workflows that affect this pipeline
      - '.github/workflows/build-test-artifacts.yml'
      - '.github/workflows/integration-test.yml'
      - '.github/workflows/test-artifacts.yml'
      - '.github/workflows/application-signals-e2e-test.yml'
      - '.github/workflows/e2e-test.yml'
      - '.github/workflows/wd-integration-test.yml'
      - '.github/workflows/ec2-integration-test.yml'
      - '.github/workflows/test-build.yml'
      - '.github/workflows/test-build-packages.yml'
      - '.github/workflows/test-build-docker.yml'
      - '.github/workflows/test-build-distributor.yml'
  schedule:
    - cron: '0 11 * * 1,2,3,4,5' # Every day at 11:00 UTC on Monday to Friday
  workflow_dispatch:
    inputs:
      run-tests:
        description: "Run test workflows after build"
        default: true
        type: boolean
  workflow_call:
    inputs:
      run-tests:
        description: "Run test workflows after build"
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  CheckRecentRun:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check for recent successful run
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RECENT=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build-test-artifacts.yml \
            --status success \
            --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty')

          if [ -n "$RECENT" ]; then
            RECENT_TS=$(date -d "$RECENT" +%s)
            NOW_TS=$(date +%s)
            DIFF=$(( NOW_TS - RECENT_TS ))
            if [ "$DIFF" -lt 14400 ]; then
              echo "should_skip=true" >> "$GITHUB_OUTPUT"
              echo "Skipping: successful run found ${DIFF}s ago (< 4 hours)"
              exit 0
            fi
          fi
          echo "should_skip=false" >> "$GITHUB_OUTPUT"

  BuildAndUpload:
    needs: [CheckRecentRun]
    if: needs.CheckRecentRun.outputs.should_skip != 'true'
    uses: ./.github/workflows/test-build.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET }}

  BuildAndUploadPackages:
    uses: ./.github/workflows/test-build-packages.yml
    needs: [BuildAndUpload]
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET }}

  BuildDocker:
    needs: [BuildAndUpload]
    uses: ./.github/workflows/test-build-docker.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      ContainerRepositoryNameAndTag: "cwagent-integration-test:${{ github.sha }}"
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"

  BuildDistributor:
    needs: [BuildAndUpload, BuildAndUploadPackages, BuildDocker]
    uses: ./.github/workflows/test-build-distributor.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET }}
      DistributorName: ${{ vars.SSM_TEST_DISTRIBUTOR_NAME }}

  BuildAndUploadITAR:
    needs: [CheckRecentRun]
    if: needs.CheckRecentRun.outputs.should_skip != 'true'
    uses: ./.github/workflows/test-build.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      Region: "us-gov-east-1"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE_ITAR }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET_ITAR }}

  BuildAndUploadCN:
    needs: [CheckRecentRun]
    if: needs.CheckRecentRun.outputs.should_skip != 'true'
    uses: ./.github/workflows/test-build.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      BucketKey: "integration-test/binary/${{ github.sha }}"
      PackageBucketKey: "integration-test/packaging/${{ github.sha }}"
      Region: "cn-north-1"
      TerraformAWSAssumeRole: ${{ vars.TERRAFORM_AWS_ASSUME_ROLE_CN }}
      Bucket: ${{ vars.S3_INTEGRATION_BUCKET_CN }}

  StartIntegrationTests:
    needs: [ BuildAndUploadPackages, BuildAndUploadITAR, BuildAndUploadCN, BuildDocker, BuildDistributor ]
    if: ${{ github.event_name == 'push' || inputs.run-tests }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - run: gh workflow run integration-test.yml --ref ${{ github.ref_name }} --repo $GITHUB_REPOSITORY -f build_run_id=${{ github.run_id }} -f build_sha=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  StartApplicationSignalsE2ETests:
    needs: [ BuildAndUploadPackages, BuildAndUploadITAR, BuildAndUploadCN, BuildDocker, BuildDistributor ]
    # Workflow only runs against main
    if: ${{ github.event_name == 'push' || inputs.run-tests }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - run: gh workflow run application-signals-e2e-test.yml --ref ${{ github.ref_name }} --repo $GITHUB_REPOSITORY -f build_run_id=${{ github.run_id }} -f build_sha=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  StartEKSE2ETests:
    needs: [ BuildAndUploadPackages, BuildAndUploadITAR, BuildAndUploadCN, BuildDocker, BuildDistributor ]
    if: ${{ github.event_name == 'push' || inputs.run-tests }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - run: gh workflow run e2e-test.yml --ref ${{ github.ref_name }} --repo $GITHUB_REPOSITORY -f build_sha=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  StartWorkloadDiscoveryIntegrationTests:
    needs: [ BuildAndUploadPackages, BuildAndUploadITAR, BuildAndUploadCN, BuildDocker, BuildDistributor ]
    if: ${{ github.event_name == 'push' || inputs.run-tests }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - run: gh workflow run wd-integration-test.yml --ref ${{ github.ref_name }} --repo $GITHUB_REPOSITORY -f build_run_id=${{ github.run_id }} -f build_sha=${{ github.sha }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
