name: Build Test Binaries

on:
  workflow_call:
    inputs:
      test_repo_name:
        required: true
        type: string
      test_repo_branch:
        required: true
        type: string
      s3_integration_bucket:
        required: true
        type: string
      terraform_assume_role:
        required: true
        type: string
      s3_integration_bucket_itar:
        required: false
        type: string
      terraform_assume_role_itar:
        required: false
        type: string
      s3_integration_bucket_cn:
        required: false
        type: string
      terraform_assume_role_cn:
        required: false
        type: string
    outputs:
      test_binaries_prefix:
        description: "S3 prefix for pre-compiled test binaries"
        value: ${{ jobs.BuildTestBinaries.outputs.test_binaries_prefix }}

jobs:
  BuildTestBinaries:
    name: 'BuildTestBinaries'
    runs-on: ubuntu-latest
    outputs:
      test_binaries_prefix: ${{ steps.build.outputs.test_binaries_prefix }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          repository: ${{ inputs.test_repo_name }}
          ref: ${{ inputs.test_repo_branch }}

      - name: Set up Go 1.x
        uses: actions/setup-go@v4
        with:
          go-version: ~1.25
          cache: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.terraform_assume_role }}
          aws-region: us-west-2

      - name: Build and upload test binaries
        id: build
        env:
          S3_BUCKET: ${{ inputs.s3_integration_bucket }}
          TEST_BRANCH: ${{ inputs.test_repo_branch }}
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "test_binaries_prefix=integration-test/test-binaries/${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

          go mod download

          for GOARCH in amd64 arm64; do
            PREFIX="integration-test/test-binaries/${COMMIT_SHA}/linux/${GOARCH}"
            mkdir -p "build/bin/${GOARCH}"

            echo "=== Building for linux/${GOARCH} ==="
            for pkg in $(go list ./test/...); do
              name=$(basename "$pkg")
              if CGO_ENABLED=0 GOOS=linux GOARCH=$GOARCH go test -c -o "build/bin/${GOARCH}/${name}.test" "$pkg" 2>&1; then
                echo "  ✓ ${name}.test"
              else
                echo "  ✗ ${name}.test (skipped)"
              fi
            done

            BUILT=$(ls "build/bin/${GOARCH}/"*.test 2>/dev/null | wc -l)
            echo "Built ${BUILT} binaries for linux/${GOARCH}"

            aws s3 cp "build/bin/${GOARCH}/" "s3://${S3_BUCKET}/${PREFIX}/" --recursive --quiet
          done
          echo "Upload complete to commercial bucket"

      - name: Upload to ITAR bucket
        if: ${{ inputs.s3_integration_bucket_itar != '' && inputs.terraform_assume_role_itar != '' }}
        env:
          S3_BUCKET_ITAR: ${{ inputs.s3_integration_bucket_itar }}
          ASSUME_ROLE_ITAR: ${{ inputs.terraform_assume_role_itar }}
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          
          # Get ITAR credentials
          CREDS=$(aws sts assume-role --role-arn "$ASSUME_ROLE_ITAR" --role-session-name "test-binaries-itar" --query 'Credentials' --output json)
          export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r '.AccessKeyId')
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r '.SecretAccessKey')
          export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r '.SessionToken')
          
          for GOARCH in amd64 arm64; do
            PREFIX="integration-test/test-binaries/${COMMIT_SHA}/linux/${GOARCH}"
            aws s3 cp "build/bin/${GOARCH}/" "s3://${S3_BUCKET_ITAR}/${PREFIX}/" --recursive --quiet --region us-gov-east-1
          done
          echo "Upload complete to ITAR bucket"

      - name: Upload to CN bucket
        if: ${{ inputs.s3_integration_bucket_cn != '' && inputs.terraform_assume_role_cn != '' }}
        env:
          S3_BUCKET_CN: ${{ inputs.s3_integration_bucket_cn }}
          ASSUME_ROLE_CN: ${{ inputs.terraform_assume_role_cn }}
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          
          # Get CN credentials
          CREDS=$(aws sts assume-role --role-arn "$ASSUME_ROLE_CN" --role-session-name "test-binaries-cn" --query 'Credentials' --output json)
          export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r '.AccessKeyId')
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r '.SecretAccessKey')
          export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r '.SessionToken')
          
          for GOARCH in amd64 arm64; do
            PREFIX="integration-test/test-binaries/${COMMIT_SHA}/linux/${GOARCH}"
            aws s3 cp "build/bin/${GOARCH}/" "s3://${S3_BUCKET_CN}/${PREFIX}/" --recursive --quiet --region cn-north-1
          done
          echo "Upload complete to CN bucket"
