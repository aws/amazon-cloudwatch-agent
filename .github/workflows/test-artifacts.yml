        if: ${{ cancelled() || failure() }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 8
          retry_wait_seconds: 5
          command: cd terraform/stress && terraform destroy --auto-approve

  EC2WinStressTrackingTest:
    if: ${{ inputs.skip_windows != true && inputs.skip_stress != true }}
    name: ${{ matrix.arrays.wip && '[WIP] ' || '' }}${{matrix.arrays.testName}}
    needs: [GenerateTestMatrix, OutputEnvVariables]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arrays: ${{ fromJson(needs.GenerateTestMatrix.outputs.ec2_windows_stress_matrix) }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          repository: ${{ needs.OutputEnvVariables.outputs.CWA_GITHUB_TEST_REPO_NAME }}
          ref: ${{ needs.OutputEnvVariables.outputs.CWA_GITHUB_TEST_REPO_BRANCH }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TERRAFORM_AWS_ASSUME_ROLE }}
          aws-region: us-west-2
          role-duration-seconds: ${{ env.TERRAFORM_AWS_ASSUME_ROLE_DURATION }}


      - name: Get Runner IP
        id: runner_ip
        run: echo "ip=$(curl -s ifconfig.me)/32" >> "$GITHUB_OUTPUT"
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      - name: Verify Terraform version
        run: terraform --version

      - name: Echo Test Info
        run: echo run on ec2 instance os ${{ matrix.arrays.os }} arc ${{ matrix.arrays.arc }} test dir ${{ matrix.arrays.test_dir }} values per minute ${{ matrix.arrays.values_per_minute }}

      - name: Terraform apply
        id: terraform_apply
        continue-on-error: true
        uses: nick-fields/retry@v2
        with:
          max_attempts: 1
          timeout_minutes: 60
          retry_wait_seconds: 5
          command: |
            cd terraform/stress
            terraform init
            if terraform apply --auto-approve \
              -var="ssh_key_value=${PRIVATE_KEY}"  \
              -var="cwa_github_sha=${{ inputs.build_id }}" \
              -var="ami=${{ matrix.arrays.ami }}" \
              -var="arc=${{ matrix.arrays.arc }}" \
              -var="s3_bucket=${S3_INTEGRATION_BUCKET}" \
              -var="ssh_key_name=${KEY_NAME}" \
              -var="values_per_minute=${{ matrix.arrays.values_per_minute}}"\
              -var="family=${{ matrix.arrays.family}}"\
              -var="test_dir=${{ matrix.arrays.test_dir }}" \
              -var="runner_ip=${{ steps.runner_ip.outputs.ip }}" ; then terraform destroy -auto-approve
            else
              terraform destroy -auto-approve && exit 1
            fi

      - name: "[WIP] ✅ Passed"
        if: steps.terraform_apply.outcome == 'success' && matrix.arrays.wip
        run: echo "::notice::WIP test passed"

      - name: "[WIP] ⚠️ Failed (Overruled)"
        if: steps.terraform_apply.outcome == 'failure' && matrix.arrays.wip
        run: |
          echo "::warning::WIP test failed but allowed to continue"
          echo "### ⚠️ WIP Test Failed (Overruled)" >> $GITHUB_STEP_SUMMARY

      - name: Fail if not WIP
        if: steps.terraform_apply.outcome == 'failure' && !matrix.arrays.wip
        run: exit 1

      - name: Terraform destroy
        if: ${{ cancelled() || failure() }}
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 8
          retry_wait_seconds: 5
          command: cd terraform/stress && terraform destroy --auto-approve

  GPUEndToEndTest:
    if: ${{ inputs.skip_gpu != true }}
    name:  ${{matrix.arrays.testName}}
    needs: [ GenerateTestMatrix, OutputEnvVariables ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arrays: ${{ fromJson(needs.GenerateTestMatrix.outputs.eks_addon_matrix) }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          repository: ${{ needs.OutputEnvVariables.outputs.CWA_GITHUB_TEST_REPO_NAME }}
          ref: ${{ needs.OutputEnvVariables.outputs.CWA_GITHUB_TEST_REPO_BRANCH }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TERRAFORM_AWS_ASSUME_ROLE }}
          aws-region: us-west-2
          role-duration-seconds: ${{ env.TERRAFORM_AWS_ASSUME_ROLE_DURATION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      - name: Verify Terraform version
        run: terraform --version

      - name: Terraform apply and setup
        id: terraform_apply
        continue-on-error: true
        run: |
          if [ "${{ matrix.arrays.terraform_dir }}" != "" ]; then
            cd "${{ matrix.arrays.terraform_dir }}"
          else
            cd terraform/eks/addon/gpu
          fi

          terraform init
          if terraform apply --auto-approve \
            -var="test_dir=${{ matrix.arrays.test_dir }}" \
            -var="cwagent_image_repo=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_INTEGRATION_TEST_REPO }}" \
            -var="cwagent_image_tag=${{ inputs.build_id }}" \
            -var="ami_type=${{ matrix.arrays.ami }}" \
            -var="instance_type=${{ matrix.arrays.instanceType }}" \
            -var="k8s_version=${{ matrix.arrays.k8sVersion }}"; then
            echo "Terraform apply successful."
          else
            terraform destroy -auto-approve && exit 1
          fi

      - name: "[WIP] ✅ Passed"
        if: steps.terraform_apply.outcome == 'success' && matrix.arrays.wip
        run: echo "::notice::WIP test passed"

      - name: "[WIP] ⚠️ Failed (Overruled)"
        if: steps.terraform_apply.outcome == 'failure' && matrix.arrays.wip
        run: |
          echo "::warning::WIP test failed but allowed to continue"
          echo "### ⚠️ WIP Test Failed (Overruled)" >> $GITHUB_STEP_SUMMARY

      - name: Fail if not WIP
        if: steps.terraform_apply.outcome == 'failure' && !matrix.arrays.wip
        run: exit 1

      - name: Terraform destroy
        if: always()
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          timeout_minutes: 8
          retry_wait_seconds: 5
          command: |
            if [ "${{ matrix.arrays.terraform_dir }}" != "" ]; then
              cd "${{ matrix.arrays.terraform_dir }}"
            else
              cd terraform/eks/addon/gpu
            fi
            terraform destroy -auto-approve
