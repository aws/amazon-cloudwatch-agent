name: Warm Go Test Cache

on:
  workflow_call:
    inputs:
      test_repo_name:
        required: true
        type: string
      test_repo_branch:
        required: true
        type: string
      s3_integration_bucket:
        required: true
        type: string
      terraform_assume_role:
        required: true
        type: string
    outputs:
      cache_key:
        description: "Cache key for restoring Go build/module caches"
        value: ${{ jobs.WarmTestCache.outputs.cache_key }}

jobs:
  WarmTestCache:
    name: 'WarmTestCache'
    runs-on: ubuntu-latest
    outputs:
      cache_key: ${{ steps.warm.outputs.cache_key }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          repository: ${{ inputs.test_repo_name }}
          ref: ${{ inputs.test_repo_branch }}

      - name: Set up Go 1.x
        uses: actions/setup-go@v4
        with:
          go-version: ~1.25
          cache: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.terraform_assume_role }}
          aws-region: us-west-2

      - name: Warm cache and upload to S3
        id: warm
        env:
          S3_BUCKET: ${{ inputs.s3_integration_bucket }}
          TEST_BRANCH: ${{ inputs.test_repo_branch }}
        run: |
          GO_VERSION=$(go env GOVERSION)
          CACHE_KEY="${TEST_BRANCH}-${GO_VERSION}-linux-amd64"
          echo "cache_key=${CACHE_KEY}" >> "$GITHUB_OUTPUT"
          echo "Cache key: ${CACHE_KEY}"

          # Download modules and compile all test packages (without running them)
          go mod download
          CGO_ENABLED=0 go test -run='^$' ./test/... 2>/dev/null || true

          # Upload caches to S3
          GOCACHE=$(go env GOCACHE)
          GOMODCACHE=$(go env GOMODCACHE)
          CACHE_PREFIX="s3://${S3_BUCKET}/integration-test/cache/${CACHE_KEY}"

          echo "Compressing build cache from ${GOCACHE}..."
          tar czf /tmp/gocache.tar.gz -C "$GOCACHE" .
          echo "Compressing module cache from ${GOMODCACHE}..."
          tar czf /tmp/gomodcache.tar.gz -C "$GOMODCACHE" .

          echo "Uploading to ${CACHE_PREFIX}..."
          aws s3 cp /tmp/gocache.tar.gz "${CACHE_PREFIX}/gocache.tar.gz" --quiet
          aws s3 cp /tmp/gomodcache.tar.gz "${CACHE_PREFIX}/gomodcache.tar.gz" --quiet

          GOCACHE_SIZE=$(du -sh /tmp/gocache.tar.gz | cut -f1)
          GOMODCACHE_SIZE=$(du -sh /tmp/gomodcache.tar.gz | cut -f1)
          echo "Build cache: ${GOCACHE_SIZE}, Module cache: ${GOMODCACHE_SIZE}"
