#
# Windows Flake Repro (TimedDeleter) — make test variant
# =======================================================
#
# Runs the full `make test` (matching the failing PR-build job) N times per
# variant on windows-latest, then greps each run's output for the target
# TimedDeleterWithIDCheck failure signature. Isolated single-test loops
# don't reproduce this flake (measured: 0/20 baseline hits) because the
# fault requires the CPU contention `make test` produces by running ~50
# package test binaries in parallel across the runner's vCPUs.
#
# Matrix legs:
#   - baseline: kubernetes_utils_test.go restored from origin/main
#   - fixed:    this branch's rewritten test
#
# Reported per matrix leg:
#   - pass:          make test succeeded end-to-end
#   - target_flake:  make test failed AND our target test was among the failures
#   - other_failure: make test failed but our target test was not the cause
#
# Each `make test` on windows-latest takes ~10–13 min. With iterations=5
# per leg (default), one push takes ~65 min per leg (legs run in parallel).

name: Windows Flake Repro (TimedDeleter)

on:
  push:
    branches:
      - fix/flaky-timed-deleter-test
  workflow_dispatch:
    inputs:
      iterations:
        description: "How many `make test` runs per variant"
        required: true
        default: "5"

jobs:
  repro:
    name: Repro (${{ matrix.variant }})
    runs-on: windows-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        variant: [baseline, fixed]
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version: ~1.26.4
          cache: false

      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Restore baseline test file (variant=baseline)
        if: matrix.variant == 'baseline'
        shell: bash
        run: |
          git fetch origin main --quiet
          git checkout origin/main -- internal/k8sCommon/k8sclient/kubernetes_utils_test.go
          echo "Restored kubernetes_utils_test.go from origin/main"

      - name: Show target test source
        shell: bash
        run: |
          echo "=== Variant: ${{ matrix.variant }} ==="
          echo "=== File sha: $(git hash-object internal/k8sCommon/k8sclient/kubernetes_utils_test.go) ==="
          awk '/^func TestTimedDeleterWithIDCheck_DeleteWithDelay_NoUpdate/,/^}$/' \
            internal/k8sCommon/k8sclient/kubernetes_utils_test.go

      - name: Install make
        run: choco install make

      - name: Warm the Go module cache
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          # Pre-download modules once so per-iteration timing reflects test
          # execution, not go.sum churn. Also fails fast if the module tree
          # is broken before we spend an hour looping.
          go mod download

      - name: Run make test N times
        shell: bash
        env:
          CGO_ENABLED: "0"
          # -count=1 disables Go's test cache. Without it, only the first
          # iteration actually runs tests; runs 2..N return cached PASS
          # results in ~20s and produce no data. Observed in run 30035934152:
          # iter 1 = 13 min, iters 2-5 = 22-57 s each. With this flag every
          # iteration is a real ~13 min test execution.
          GOFLAGS: "-count=1"
          ITERATIONS: ${{ inputs.iterations || '5' }}
          VARIANT: ${{ matrix.variant }}
          TARGET_TEST: TestTimedDeleterWithIDCheck_DeleteWithDelay_NoUpdate
        run: |
          set +e
          pass=0
          target_flake=0
          other_failure=0
          target_indices=""
          other_indices=""
          mkdir -p repro-logs
          for i in $(seq 1 "$ITERATIONS"); do
            log="repro-logs/make-test-$(printf '%02d' "$i").log"
            echo ""
            echo "===================== make test run $i / $ITERATIONS ====================="
            date -u +"start: %Y-%m-%dT%H:%M:%SZ"
            make test > "$log" 2>&1
            rc=$?
            date -u +"end:   %Y-%m-%dT%H:%M:%SZ  (rc=$rc)"

            # Classify the outcome. `make test` returns 0 only if every package
            # passed. On failure, look for `--- FAIL: <target>` — Go prints one
            # per failing test, so our target is present iff it flaked in this
            # run. Multiple tests may fail; we only count target vs non-target.
            if [ "$rc" -eq 0 ]; then
              pass=$((pass + 1))
              echo "result: PASS"
            elif grep -qE "^--- FAIL: ${TARGET_TEST}(\$|[[:space:]])" "$log"; then
              target_flake=$((target_flake + 1))
              target_indices="$target_indices $i"
              echo "result: TARGET FLAKE"
              grep -E "^--- FAIL:" "$log" | sed 's/^/  /'
            else
              other_failure=$((other_failure + 1))
              other_indices="$other_indices $i"
              echo "result: OTHER FAILURE"
              grep -E "^--- FAIL:" "$log" | sed 's/^/  /' | head -20
            fi
          done
          echo ""
          echo "================== SUMMARY =================="
          echo "Variant:        $VARIANT"
          echo "OS:             windows-latest"
          echo "Iterations:     $ITERATIONS"
          echo "Passed:         $pass"
          echo "Target flake:   $target_flake (our TimedDeleter test failed)"
          echo "Other failure:  $other_failure (make test failed, our test did not)"
          if [ "$target_flake" -gt 0 ]; then
            echo "Target flake iterations:$target_indices"
          fi
          if [ "$other_failure" -gt 0 ]; then
            echo "Other-failure iterations:$other_indices"
          fi
          echo "============================================="
          {
            echo "## Windows Flake Repro (make test) — \`$VARIANT\`"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| OS | windows-latest |"
            echo "| Iterations | $ITERATIONS |"
            echo "| Passed (make test rc=0) | $pass |"
            echo "| Target flake (${TARGET_TEST}) | $target_flake |"
            echo "| Other failure (unrelated test) | $other_failure |"
            if [ "$target_flake" -gt 0 ]; then
              echo "| Target flake iterations |$target_indices |"
            fi
            if [ "$other_failure" -gt 0 ]; then
              echo "| Other-failure iterations |$other_indices |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload per-run logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repro-logs-${{ matrix.variant }}-${{ github.run_id }}
          path: repro-logs/
          if-no-files-found: warn
