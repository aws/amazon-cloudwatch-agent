#
# Windows Flake Repro — make test variant
# =======================================
#
# Runs the full `make test` (matching the failing PR-build job) N times per
# variant on windows-latest, then greps each run's output for the target
# failure signatures we want to A/B. Isolated single-test loops don't
# reproduce these flakes because the faults require the CPU contention
# `make test` produces by running ~50 package test binaries in parallel
# across the runner's vCPUs (Windows default timer resolution is ~15.6ms
# and scheduling jitter under load routinely blows past narrow assertion
# windows).
#
# Target tests A/B'd on this branch:
#   - TestTimedDeleterWithIDCheck_DeleteWithDelay_* (k8sclient, 3 variants)
#   - TestConvertOtelMetrics_{Dimensions,NoDimensions,Histogram} (cloudwatch output plugin,
#     3 siblings sharing the same checkDatum wall-clock budget)
#   - TestTailerSrc (logfile input plugin)
#   - TestMiddleware (cloudwatch output plugin)
#   - TestBackoffRetries (cloudwatch output plugin)
#   - TestPublish (cloudwatch output plugin, discovered on run 30058956003 fixed iter 9)
#   - TestAdmitAndRollup (awsapplicationsignals cardinalitycontrol; the ONE production
#     code fix in this branch -- topKMetrics.Push initialized minMetric with a stale
#     freq=0 metric, causing a 3rd distinct random key to evict a full top-K entry)
#
# Matrix legs:
#   - baseline: instrumented pre-fix versions of every test file this branch
#               touches are overlaid on origin/main so the flakes fire AND emit
#               diagnostic logs (baseline-instrument: ...). The overlay files
#               live under .github/workflows/baseline-with-logs/ with paths
#               mirrored to their real source-tree location.
#   - fixed:    this branch's rewritten tests + instrumentation
#
# Reported per matrix leg:
#   - pass:          make test succeeded end-to-end
#   - target_flake:  make test failed AND at least one target test was among
#                    the failures (counted per target so we can see which
#                    fix actually landed)
#   - other_failure: make test failed but no target test was the cause
#
# Each `make test` on windows-latest takes ~5-13 min (iter 1 slower due to
# module cache warmup). With iterations=30 per leg (default), each matrix
# leg needs ~3 hours. Both legs run in parallel, so wall time is ~3 hours.

name: Windows Flake Repro (TimedDeleter)

on:
  push:
    branches:
      - fix/flaky-timed-deleter-test
  workflow_dispatch:
    inputs:
      iterations:
        description: "How many `make test` runs per variant"
        required: true
        default: "30"

jobs:
  repro:
    name: Repro (${{ matrix.variant }})
    runs-on: windows-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        variant: [baseline, fixed]
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version: ~1.26.4
          cache: false

      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Overlay instrumented baseline files (variant=baseline)
        if: matrix.variant == 'baseline'
        shell: bash
        run: |
          # For each file under .github/workflows/baseline-with-logs/, the path
          # relative to that directory is the destination in the source tree.
          # These files are the origin/main versions with baseline-instrument:
          # t.Logf calls inserted before every flaky assertion (see the
          # commit that introduced them for the diff). The overlay both:
          #   1. Reverts the assertion-side fixes back to origin/main behavior
          #      so the flakes fire on baseline.
          #   2. Adds t.Logf lines that print elapsed timings, goroutine counts,
          #      and observed counter values -- these lines are always visible
          #      in `make test` output whenever the enclosing test fails,
          #      giving us live diagnostic data on every flake.
          # tail.go is intentionally NOT restored: its changes on this branch
          # are Logger.Debugf calls (filtered at INFO by default) that don't
          # affect any test behavior, so keeping the branch version means we
          # can enable debug logging in the future to trace tailer lifecycle
          # if the flake reappears.
          overlay_root=".github/workflows/baseline-with-logs"
          count=0
          while IFS= read -r src; do
            rel="${src#${overlay_root}/}"
            cp "$src" "$rel"
            echo "overlaid: $rel"
            count=$((count + 1))
          done < <(find "$overlay_root" -type f -name '*.go')
          echo "overlaid $count file(s)"
          echo ""
          echo "Post-overlay git status:"
          git status --short
          # Verify overlay files match their baseline-with-logs source.
          # A drift check would happen at PR review; here we just confirm the
          # copies landed.
          echo ""
          echo "Overlay file SHAs (source vs destination):"
          while IFS= read -r src; do
            rel="${src#${overlay_root}/}"
            src_sha=$(git hash-object "$src")
            dst_sha=$(git hash-object "$rel")
            match="MATCH"
            if [ "$src_sha" != "$dst_sha" ]; then
              match="MISMATCH"
            fi
            echo "  $match src=$src_sha dst=$dst_sha $rel"
          done < <(find "$overlay_root" -type f -name '*.go')

      - name: Show target test sources
        shell: bash
        run: |
          echo "=== Variant: ${{ matrix.variant }} ==="
          for f in \
            internal/k8sCommon/k8sclient/kubernetes_utils_test.go \
            plugins/outputs/cloudwatch/convert_otel_test.go \
            plugins/outputs/cloudwatch/cloudwatch_test.go \
            plugins/inputs/logfile/tailersrc_test.go
          do
            echo "--- $f sha=$(git hash-object "$f") ---"
          done

      - name: Install make
        run: choco install make

      - name: Warm the Go module cache
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          # Pre-download modules once so per-iteration timing reflects test
          # execution, not go.sum churn. Also fails fast if the module tree
          # is broken before we spend an hour looping.
          go mod download

      - name: Run make test N times
        shell: bash
        env:
          CGO_ENABLED: "0"
          # -count=1 disables Go's test cache. Without it, only the first
          # iteration actually runs tests; runs 2..N return cached PASS
          # results in ~20s and produce no data. Observed in run 30035934152:
          # iter 1 = 13 min, iters 2-5 = 22-57 s each. With this flag every
          # iteration is a real ~13 min test execution.
          GOFLAGS: "-count=1"
          ITERATIONS: ${{ inputs.iterations || '30' }}
          VARIANT: ${{ matrix.variant }}
          TARGET_TESTS: |
            TestTimedDeleterWithIDCheck_DeleteWithDelay_NoUpdate
            TestTimedDeleterWithIDCheck_DeleteWithDelay_WithUpdate
            TestTimedDeleterWithIDCheck_DeleteWithDelay_InvalidType
            TestConvertOtelMetrics_Dimensions
            TestConvertOtelMetrics_NoDimensions
            TestConvertOtelMetrics_Histogram
            TestTailerSrc
            TestMiddleware
            TestBackoffRetries
            TestPublish
            TestAdmitAndRollup
        run: |
          set +e
          pass=0
          target_flake=0
          other_failure=0
          target_indices=""
          other_indices=""
          # Per-target hit counters (initialized to 0 for each name).
          declare -A per_target_hits
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            per_target_hits["$t"]=0
          done <<< "$TARGET_TESTS"
          mkdir -p repro-logs
          for i in $(seq 1 "$ITERATIONS"); do
            log="repro-logs/make-test-$(printf '%02d' "$i").log"
            echo ""
            echo "===================== make test run $i / $ITERATIONS ====================="
            date -u +"start: %Y-%m-%dT%H:%M:%SZ"
            make test > "$log" 2>&1
            rc=$?
            date -u +"end:   %Y-%m-%dT%H:%M:%SZ  (rc=$rc)"

            # Classify. On success everything passed. On failure, check every
            # target test in parallel — any hit is a target flake and we record
            # which ones fired; if none of the targets fired, it's an
            # unrelated failure (which we still want to see in the log tail).
            if [ "$rc" -eq 0 ]; then
              pass=$((pass + 1))
              echo "result: PASS"
              continue
            fi
            hit_any=0
            hits_this_iter=""
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              if grep -qE "^--- FAIL: ${t}(\$|[[:space:]])" "$log"; then
                per_target_hits["$t"]=$((per_target_hits["$t"] + 1))
                hits_this_iter="$hits_this_iter $t"
                hit_any=1
              fi
            done <<< "$TARGET_TESTS"
            if [ "$hit_any" -eq 1 ]; then
              target_flake=$((target_flake + 1))
              target_indices="$target_indices $i"
              echo "result: TARGET FLAKE ($hits_this_iter)"
              grep -E "^--- FAIL:" "$log" | sed 's/^/  /'
            else
              other_failure=$((other_failure + 1))
              other_indices="$other_indices $i"
              echo "result: OTHER FAILURE"
              grep -E "^--- FAIL:" "$log" | sed 's/^/  /' | head -20
            fi
          done
          echo ""
          echo "================== SUMMARY =================="
          echo "Variant:        $VARIANT"
          echo "OS:             windows-latest"
          echo "Iterations:     $ITERATIONS"
          echo "Passed:         $pass"
          echo "Target flake:   $target_flake iterations (any target test failed)"
          echo "Other failure:  $other_failure iterations (unrelated test failed)"
          if [ "$target_flake" -gt 0 ]; then
            echo "Target flake iterations:$target_indices"
          fi
          if [ "$other_failure" -gt 0 ]; then
            echo "Other-failure iterations:$other_indices"
          fi
          echo ""
          echo "Per-target hit counts:"
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            printf "  %-70s %d\n" "$t" "${per_target_hits[$t]}"
          done <<< "$TARGET_TESTS"
          echo "============================================="
          {
            echo "## Windows Flake Repro (make test) — \`$VARIANT\`"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| OS | windows-latest |"
            echo "| Iterations | $ITERATIONS |"
            echo "| Passed (make test rc=0) | $pass |"
            echo "| Target flake (any target failed) | $target_flake |"
            echo "| Other failure (unrelated test) | $other_failure |"
            if [ "$target_flake" -gt 0 ]; then
              echo "| Target flake iterations |$target_indices |"
            fi
            if [ "$other_failure" -gt 0 ]; then
              echo "| Other-failure iterations |$other_indices |"
            fi
            echo ""
            echo "### Per-target hit counts"
            echo ""
            echo "| Test | Hits |"
            echo "| --- | --- |"
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              echo "| \`$t\` | ${per_target_hits[$t]} |"
            done <<< "$TARGET_TESTS"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload per-run logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repro-logs-${{ matrix.variant }}-${{ github.run_id }}
          path: repro-logs/
          if-no-files-found: warn
