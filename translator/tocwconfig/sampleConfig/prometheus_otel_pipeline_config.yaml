connectors:
    forward/opentelemetry: {}
receivers:
    prometheus:
        config:
            global:
                evaluation_interval: 1m
                scrape_interval: 30s
                scrape_protocols:
                    - OpenMetricsText1.0.0
                    - OpenMetricsText0.0.1
                    - PrometheusText1.0.0
                    - PrometheusText0.0.4
                scrape_timeout: 10s
            scrape_configs:
                - enable_compression: true
                  enable_http2: true
                  follow_redirects: true
                  honor_timestamps: true
                  job_name: test_app
                  metrics_path: /metrics
                  scheme: http
                  scrape_interval: 30s
                  scrape_protocols:
                    - OpenMetricsText1.0.0
                    - OpenMetricsText0.0.1
                    - PrometheusText1.0.0
                    - PrometheusText0.0.4
                  scrape_timeout: 10s
                  static_configs:
                    - targets:
                        - localhost:9090
                  track_timestamps_staleness: false
        report_extra_scrape_metrics: false
        start_time_metric_regex: ""
        trim_metric_suffixes: false
        use_start_time_metric: false
service:
    extensions: []
    pipelines:
        metrics/otel_prometheus:
            exporters:
                - forward/opentelemetry
            processors: []
            receivers:
                - prometheus
    telemetry:
        logs:
            encoding: console
            level: info
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
