connectors:
    routing/application_signals_logs:
        default_pipelines:
            - logs/application_signals_logs_batch
        error_mode: ignore
        table:
            - condition: attributes["event.name"] == "aws.service_events.aggregate_profile"
              context: log
              pipelines:
                - logs/application_signals_logs_nobatch
              statement: ""
exporters:
    otlphttp/application_signals_logs:
        auth:
            authenticator: headers_setter/application_signals_logs
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: https://logs.us-east-1.amazonaws.com/v1/logs
        max_idle_conns: 100
        metrics_endpoint: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
extensions:
    agenthealth/logs:
        is_usage_data_enabled: true
        stats:
            operations:
                - PutLogEvents
            usage_flags:
                mode: EC2
                region_type: ACJ
    awscloudwatchlogsprovisioner:
        additional_auth: sigv4auth/logs
        logs_provision_failure_backoff: 30s
        logs_provision_timeout: 10s
        region: us-east-1
    entitystore:
        mode: ec2
        region: us-east-1
    headers_setter/application_signals_logs:
        additional_auth: awscloudwatchlogsprovisioner
        headers:
            - action: upsert
              from_context: aws.log.group.name
              key: x-aws-log-group
            - action: upsert
              from_context: aws.log.stream.name
              key: x-aws-log-stream
    sigv4auth/logs:
        assume_role:
            sts_region: us-east-1
        region: us-east-1
        service: logs
processors:
    attributestocontext:
        actions:
            - from_resource_attribute: aws.log.group.name
              key: aws.log.group.name
            - from_resource_attribute: aws.log.stream.name
              key: aws.log.stream.name
    batch/application_signals_logs:
        metadata_cardinality_limit: 1000
        metadata_keys:
            - aws.log.group.name
            - aws.log.stream.name
        send_batch_max_size: 0
        send_batch_size: 8192
        timeout: 5s
    transform/application_signals_logs:
        error_mode: propagate
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: propagate
              statements:
                - set(resource.attributes["aws.log.group.name"], Concat(["/", resource.attributes["deployment.environment"], "/prefix/", resource.attributes["service.name"]], ""))
                - replace_pattern(resource.attributes["aws.log.group.name"], "<nil>", "undefined")
                - set(resource.attributes["aws.log.stream.name"], Concat([resource.attributes["host.name"], "/", resource.attributes["service.instance.id"]], ""))
                - replace_pattern(resource.attributes["aws.log.stream.name"], "<nil>", "undefined")
        metric_statements: []
        trace_statements: []
    transform/application_signals_logs_cleanup:
        error_mode: propagate
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: propagate
              statements:
                - delete_key(resource.attributes, "aws.log.group.name")
                - delete_key(resource.attributes, "aws.log.stream.name")
        metric_statements: []
        trace_statements: []
receivers:
    otlp/grpc_0_0_0_0_4315:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4315
                keepalive:
                    enforcement_policy: {}
                    server_parameters: {}
                read_buffer_size: 524288
                transport: tcp
    otlp/http_0_0_0_0_4316:
        protocols:
            http:
                cors: {}
                endpoint: 0.0.0.0:4316
                idle_timeout: 0s
                logs_url_path: /v1/logs
                metrics_url_path: /v1/metrics
                read_header_timeout: 0s
                traces_url_path: /v1/traces
                write_timeout: 0s
service:
    extensions:
        - headers_setter/application_signals_logs
        - sigv4auth/logs
        - awscloudwatchlogsprovisioner
        - agenthealth/logs
        - entitystore
    pipelines:
        logs/application_signals_logs_batch:
            exporters:
                - otlphttp/application_signals_logs
            processors:
                - batch/application_signals_logs
            receivers:
                - routing/application_signals_logs
        logs/application_signals_logs_nobatch:
            exporters:
                - otlphttp/application_signals_logs
            processors: []
            receivers:
                - routing/application_signals_logs
        logs/application_signals_logs_route:
            exporters:
                - routing/application_signals_logs
            processors:
                - transform/application_signals_logs
                - attributestocontext
                - transform/application_signals_logs_cleanup
            receivers:
                - otlp/grpc_0_0_0_0_4315
                - otlp/http_0_0_0_0_4316
    telemetry:
        logs:
            encoding: console
            level: info
            output_paths:
                - /opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
