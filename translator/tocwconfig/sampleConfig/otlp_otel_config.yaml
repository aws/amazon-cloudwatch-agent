connectors:
    forward/opentelemetry: {}
receivers:
    otlp/grpc_127_0_0_1_4317:
        protocols:
            grpc:
                endpoint: 127.0.0.1:4317
                keepalive:
                    enforcement_policy: {}
                    server_parameters: {}
                read_buffer_size: 524288
                transport: tcp
    otlp/http_127_0_0_1_4318:
        protocols:
            http:
                cors: {}
                endpoint: 127.0.0.1:4318
                idle_timeout: 0s
                logs_url_path: /v1/logs
                metrics_url_path: /v1/metrics
                read_header_timeout: 0s
                traces_url_path: /v1/traces
                write_timeout: 0s
service:
    extensions: []
    pipelines:
        logs/otlp:
            exporters:
                - forward/opentelemetry
            processors: []
            receivers:
                - otlp/grpc_127_0_0_1_4317
                - otlp/http_127_0_0_1_4318
        metrics/otlp:
            exporters:
                - forward/opentelemetry
            processors: []
            receivers:
                - otlp/grpc_127_0_0_1_4317
                - otlp/http_127_0_0_1_4318
        traces/otlp:
            exporters:
                - forward/opentelemetry
            processors: []
            receivers:
                - otlp/grpc_127_0_0_1_4317
                - otlp/http_127_0_0_1_4318
    telemetry:
        logs:
            encoding: console
            level: info
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
