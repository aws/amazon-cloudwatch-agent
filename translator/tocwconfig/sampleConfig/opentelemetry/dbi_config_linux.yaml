        profile_statements: []
        trace_statements: []
receivers:
    filelog/postgresql_0:
        encoding: utf-8
        exclude_older_than: 0s
        fingerprint_size: 1000
        force_flush_period: 500ms
        id: file_input
        include:
            - /var/lib/pgsql/data/log/postgresql-*.log
        include_file_name: true
        initial_buffer_size: 16384
        max_concurrent_files: 1024
        max_log_size: 1048576
        max_log_size_behavior: split
        on_truncate: ignore
        operators: []
        poll_interval: 200ms
        retry_on_failure:
            enabled: false
            initial_interval: 1s
            max_elapsed_time: 5m0s
            max_interval: 30s
        start_at: end
        type: file_input
    hostmetrics/opentelemetry:
        collection_interval: 30s
        initial_delay: 1s
