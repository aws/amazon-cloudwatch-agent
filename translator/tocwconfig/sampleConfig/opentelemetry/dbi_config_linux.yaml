connectors:
    count/dbi_dbload:
        datapoints:
            metric.datapoint.count:
                description: The number of data points observed.
        logs:
            postgresql.active_sessions.by_app:
                attributes:
                    - key: db.system.name
                    - key: postgresql.application_name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by application
            postgresql.active_sessions.by_db:
                attributes:
                    - key: db.system.name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by database
            postgresql.active_sessions.by_host:
                attributes:
                    - key: db.system.name
                    - key: network.peer.address
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by host
            postgresql.active_sessions.by_sql:
                attributes:
                    - key: db.system.name
                    - key: postgresql.query_id
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by query
            postgresql.active_sessions.by_sql_wait:
                attributes:
                    - key: db.system.name
                    - key: postgresql.query_id
                    - key: postgresql.wait_event_type
                    - key: postgresql.wait_event
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by query and wait
            postgresql.active_sessions.by_user:
                attributes:
                    - key: db.system.name
                    - key: user.name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by user
            postgresql.active_sessions.by_wait:
                attributes:
                    - key: db.system.name
                    - key: postgresql.wait_event_type
                    - key: postgresql.wait_event
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by wait event
            postgresql.active_sessions.count:
                attributes:
                    - key: db.system.name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Total active sessions
        metrics:
            metric.count:
                description: The number of metrics observed.
        profiles:
            profile.count:
                description: The number of profiles observed.
        spanevents:
            trace.span.event.count:
                description: The number of span events observed.
        spans:
            trace.span.count:
                description: The number of spans observed.
    forward/opentelemetry: {}
    signal_to_metrics/dbi_topsql:
        error_mode: propagate
        logs:
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
                - key: postgresql.rolname
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.calls"] != nil
              description: SQL execution count
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.calls
              sum:
                monotonic: false
                value: Int(attributes["postgresql.calls"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
                - key: postgresql.rolname
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.total_exec_time"] != nil
              description: Total execution time in ms
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.total_exec_time
              sum:
                monotonic: false
                value: Double(attributes["postgresql.total_exec_time"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
                - key: postgresql.rolname
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.total_plan_time"] != nil
              description: Total plan time in ms
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.total_plan_time
              sum:
                monotonic: false
                value: Double(attributes["postgresql.total_plan_time"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
                - key: postgresql.rolname
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.rows"] != nil
              description: Rows affected
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.rows
              sum:
                monotonic: false
                value: Int(attributes["postgresql.rows"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.shared_blks_hit"] != nil
              description: Shared blocks hit
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.shared_blks_hit
              sum:
                monotonic: false
                value: Int(attributes["postgresql.shared_blks_hit"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.shared_blks_read"] != nil
              description: Shared blocks read
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.shared_blks_read
              sum:
                monotonic: false
                value: Int(attributes["postgresql.shared_blks_read"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.local_blks_hit"] != nil
              description: Local blocks hit
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.local_blks_hit
              sum:
                monotonic: false
                value: Int(attributes["postgresql.local_blks_hit"])
              unit: ""
            - attributes:
                - key: db.system.name
                  keys_expression: ""
                  optional: false
                - key: postgresql.queryid
                  keys_expression: ""
                  optional: false
                - key: db.namespace
                  keys_expression: ""
                  optional: false
              conditions:
                - attributes["postgresql.local_blks_read"] != nil
              description: Local blocks read
              include_resource_attributes:
                - key: service.instance.id
                  keys_expression: ""
                  optional: false
              name: postgresql.local_blks_read
              sum:
                monotonic: false
                value: Int(attributes["postgresql.local_blks_read"])
              unit: ""
exporters:
    otlp_http/logs:
        auth:
            authenticator: agenthealth/opentelemetry_logs
        compression: gzip
        encoding: proto
        force_attempt_http2: true
        idle_conn_timeout: 1m30s
        logs_endpoint: https://logs.us-west-2.amazonaws.com/v1/logs
        max_idle_conns: 100
        metrics_endpoint: ""
        profiles_endpoint: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            batch: null
            block_on_overflow: false
            num_consumers: 10
            queue_size: 1000
            sizer: null
            storage: null
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
    otlp_http/metrics:
        auth:
            authenticator: agenthealth/opentelemetry_metrics
        compression: gzip
        encoding: proto
        force_attempt_http2: true
        idle_conn_timeout: 1m30s
        logs_endpoint: ""
        max_idle_conns: 100
        metrics_endpoint: https://monitoring.us-west-2.amazonaws.com/v1/metrics
        profiles_endpoint: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            batch: null
            block_on_overflow: false
            num_consumers: 10
            queue_size: 1000
            sizer: null
            storage: null
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
extensions:
    agenthealth/opentelemetry_logs:
        additional_auth: headers_setter/logs
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EC2
                region_type: ACJ
    agenthealth/opentelemetry_metrics:
        additional_auth: sigv4auth/monitoring
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EC2
                region_type: ACJ
    awscloudwatchlogsprovisioner:
        additional_auth: sigv4auth/logs
        imds_retries: 1
        logs_provision_failure_backoff: 30s
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 10
    headers_setter/logs:
        additional_auth: awscloudwatchlogsprovisioner
        headers:
            - action: upsert
              from_context: aws.log.group.name
              key: x-aws-log-group
            - action: upsert
              from_context: aws.log.stream.name
              key: x-aws-log-stream
    sigv4auth/logs:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: logs
    sigv4auth/monitoring:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: monitoring
