service:
    extensions:
        - sigv4auth/monitoring
        - agenthealth/opentelemetry_metrics
        - sigv4auth/logs
        - awscloudwatchlogsprovisioner
        - headers_setter/logs
        - agenthealth/opentelemetry_logs
    pipelines:
        logs/dbi_postgresql_0:
            exporters:
                - count/dbi_dbload
                - signal_to_metrics/dbi_topsql
            processors:
                - filter/dbi_exclude_monitor_0
            receivers:
                - postgresql/metrics_0
        logs/dbi_postgresql_rawevents_0:
            exporters:
                - forward/opentelemetry
            processors:
                - filter/dbi_exclude_monitor_0
                - transform/dbi_scope_0
                - resourcedetection/opentelemetry
                - transform/dbi_resource_0
                - transform/dbi_logs_raw-events_0
            receivers:
                - postgresql/events_0
        logs/dbi_postgresql_serverlogs_0:
            exporters:
                - forward/opentelemetry
            processors:
                - transform/dbi_scope_0
                - resourcedetection/opentelemetry
                - transform/dbi_resource_0
                - transform/dbi_logs_server-logs_0
            receivers:
                - filelog/postgresql_0
        logs/opentelemetry:
            exporters:
                - otlp_http/logs
            processors:
                - resourcedetection/opentelemetry
                - transform/identity
                - transform/logs_routing
                - attributestocontext/opentelemetry
                - transform/logs_cleanup
                - batch/opentelemetry_logs
            receivers:
                - forward/opentelemetry
        metrics/dbi_postgresql_0:
            exporters:
                - forward/opentelemetry
            processors:
                - transform/dbi_scope_0
                - transform/dbi_resource_0
                - transform/dbi_fix_start_time
            receivers:
                - postgresql/metrics_0
                - count/dbi_dbload
                - signal_to_metrics/dbi_topsql
        metrics/host_metrics:
            exporters:
                - forward/opentelemetry
            processors:
                - transform/host_metrics_scope
            receivers:
                - hostmetrics/opentelemetry
        metrics/opentelemetry:
            exporters:
                - otlp_http/metrics
            processors:
                - resourcedetection/opentelemetry
                - transform/identity
                - batch/opentelemetry_metrics
            receivers:
                - forward/opentelemetry
    telemetry:
        logs:
            encoding: console
            error_output_paths: null
            level: info
            output_paths:
                - /opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
            propagators: null
