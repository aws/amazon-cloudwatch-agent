                        enabled: true
                    system.linux.memory.dirty:
                        enabled: true
                    system.memory.limit:
                        enabled: true
                    system.memory.page_size:
                        enabled: true
                    system.memory.utilization:
                        enabled: true
            network: null
            process:
                include:
                    match_type: regexp
                    names:
                        - post(gres|master).*
                metrics:
                    process.cpu.utilization:
                        enabled: true
                    process.memory.utilization:
                        enabled: true
                mute_process_all_errors: true
            processes: null
        timeout: 0s
