            postgresql.blks_hit:
                enabled: false
            postgresql.blks_read:
                enabled: false
            postgresql.blocks_read:
                aggregation_strategy: sum
                attributes:
                    - source
                enabled: true
            postgresql.commits:
                enabled: true
            postgresql.connection.max:
                enabled: true
            postgresql.database.count:
                enabled: true
            postgresql.database.locks:
