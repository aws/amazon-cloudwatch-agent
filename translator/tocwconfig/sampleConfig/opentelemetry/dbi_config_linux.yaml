                attributes:
                    - function
                enabled: false
            postgresql.index.scans:
                enabled: true
            postgresql.index.size:
                enabled: true
            postgresql.operations:
                aggregation_strategy: sum
                attributes:
                    - operation
                enabled: true
            postgresql.replication.data_delay:
                aggregation_strategy: avg
                attributes:
                    - replication_client
                enabled: true
            postgresql.rollbacks:
                enabled: true
            postgresql.rows:
                aggregation_strategy: sum
                attributes:
                    - state
                enabled: true
            postgresql.sequential_scans:
                enabled: false
            postgresql.sessions:
