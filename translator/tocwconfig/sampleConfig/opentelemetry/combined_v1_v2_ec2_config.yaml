                    enabled: false
                host.cpu.cache.l2.size:
                    enabled: false
                host.cpu.family:
                    enabled: false
                host.cpu.model.id:
                    enabled: false
                host.cpu.model.name:
                    enabled: false
                host.cpu.stepping:
                    enabled: false
                host.cpu.vendor.id:
                    enabled: false
                host.id:
                    enabled: false
                host.ip:
                    enabled: false
                host.mac:
                    enabled: false
                host.name:
                    enabled: true
                os.description:
                    enabled: false
                os.type:
                    enabled: true
                os.version:
                    enabled: false
        timeout: 2s
    transform/dbi_fix_start_time:
        error_mode: ignore
        flatten_data: false
        log_statements: []
        metric_statements:
            - context: datapoint
              error_mode: ignore
              statements:
                - set(datapoint.start_time_unix_nano, datapoint.time_unix_nano) where datapoint.start_time_unix_nano == 0
                - replace_match(datapoint.attributes["postgresql.wait_event_type"], "", "CPU")
                - replace_match(datapoint.attributes["postgresql.wait_event"], "", "CPU")
                - replace_match(datapoint.attributes["postgresql.application_name"], "", "unknown")
                - replace_match(datapoint.attributes["network.peer.address"], "", "unknown")
                - replace_match(datapoint.attributes["postgresql.query_id"], "", "unknown")
                - replace_match(datapoint.attributes["user.name"], "", "unknown")
        trace_statements: []
    transform/dbi_logs_raw-events_0:
        error_mode: propagate
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: propagate
              statements:
                - set(resource.attributes["aws.log.group.name"], "/aws/self-managed-database-insights/postgresql/raw-events")
                - set(resource.attributes["aws.log.stream.name"], Concat([resource.attributes["host.id"], "my-postgres"], "/"))
        metric_statements: []
        trace_statements: []
    transform/dbi_logs_server-logs_0:
        error_mode: propagate
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: propagate
              statements:
                - set(resource.attributes["aws.log.group.name"], "/aws/self-managed-database-insights/postgresql/server-logs")
                - set(resource.attributes["aws.log.stream.name"], Concat([resource.attributes["host.id"], "my-postgres"], "/"))
        metric_statements: []
        trace_statements: []
    transform/dbi_resource_0:
        error_mode: propagate
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: propagate
              statements:
                - set(resource.attributes["db.system.name"], "postgresql")
                - set(resource.attributes["db.instance.name"], "my-postgres")
        metric_statements:
            - context: resource
              error_mode: propagate
              statements:
                - set(resource.attributes["db.system.name"], "postgresql")
                - set(resource.attributes["db.instance.name"], "my-postgres")
        trace_statements: []
