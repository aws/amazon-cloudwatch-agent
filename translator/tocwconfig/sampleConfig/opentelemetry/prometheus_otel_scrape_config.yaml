global:
  scrape_interval: 30s
  scrape_timeout: 10s
scrape_configs:
  - job_name: 'test_app'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_name]
        regex: (.*)
        target_label: pod
        replacement: $1
      - source_labels: [__address__]
        regex: (.*)
        target_label: host
        replacement: ${1}
