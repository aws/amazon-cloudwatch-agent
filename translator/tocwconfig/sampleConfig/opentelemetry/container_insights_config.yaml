connectors:
    forward/opentelemetry: {}
exporters:
    otlphttp/metrics:
        auth:
            authenticator: agenthealth/opentelemetry_metrics
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: ""
        max_idle_conns: 100
        metrics_endpoint: https://monitoring.us-east-1.amazonaws.com/v1/metrics
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
extensions:
    agenthealth/opentelemetry_metrics:
        additional_auth: sigv4auth/monitoring
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EKS
                region_type: ACJ
    nodemetadatacache/cw_k8s_ci_v0:
        namespace: amazon-cloudwatch
    server:
        listen_addr: :4311
        tls_ca_path: /etc/amazon-cloudwatch-observability-agent-client-cert/tls-ca.crt
        tls_cert_path: /etc/amazon-cloudwatch-observability-agent-server-cert/server.crt
        tls_key_path: /etc/amazon-cloudwatch-observability-agent-server-cert/server.key
    sigv4auth/monitoring:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-east-1
        request_timeout_seconds: 30
        service: monitoring
processors:
    awsattributelimit/cw_k8s_ci_v0:
        max_total_attributes: 150
        unconditional_removal_keys:
            - k8s.node.label.topology.kubernetes.io/region
            - k8s.node.label.topology.kubernetes.io/zone
            - k8s.node.label.topology.ebs.csi.aws.com/zone
            - k8s.node.label.node.kubernetes.io/instance-type
            - k8s.node.label.kubernetes.io/hostname
            - k8s.node.label.helm.sh/chart
            - k8s.node.label.release
            - k8s.node.label.eks.amazonaws.com/nodegroup-image
            - k8s.node.label.k8s.io/cloud-provider-aws
            - k8s.node.label.eks.amazonaws.com/sourceLaunchTemplateId
            - k8s.node.label.eks.amazonaws.com/sourceLaunchTemplateVersion
            - k8s.pod.label.pod-template-hash
            - k8s.pod.label.controller-revision-hash
        unconditional_removal_prefixes:
            - k8s.node.label.feature.node.kubernetes.io/
            - k8s.node.label.beta.kubernetes.io/
            - k8s.node.label.failure-domain.beta.kubernetes.io/
            - k8s.node.label.alpha.eksctl.io/
    awsdevicepodcorrelation/cw_k8s_ci_v0:
        device_types:
            - device_id_attribute: neuroncore
              name: neuron-by-core
              resource_names:
                - aws.amazon.com/neuroncore
            - device_id_attribute: neurondevice
              name: neuron-by-device
              resource_names:
                - aws.amazon.com/neurondevice
                - aws.amazon.com/neuron
            - device_id_attribute: aws.efa.device
              name: efa
              resource_names:
                - vpc.amazonaws.com/efa
    awsneuron/cw_k8s_ci_v0: null
    batch/opentelemetry:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 1000
        send_batch_size: 1000
        timeout: 15s
    filter/cw_k8s_ci_v0_apiserver_build_info:
        error_mode: ignore
        metrics:
            metric:
                - name == "kubernetes_build_info"
    filter/cw_k8s_ci_v0_cadvisor_empty:
        error_mode: ignore
        metrics:
            datapoint:
                - attributes["container"] == "" and attributes["pod"] == ""
                - attributes["container"] == "" and attributes["pod"] == nil
                - attributes["container"] == nil and attributes["pod"] == ""
                - attributes["container"] == nil and attributes["pod"] == nil
    filter/cw_k8s_ci_v0_cadvisor_pod:
        error_mode: ignore
        metrics:
            datapoint:
                - attributes["container"] == "POD"
    filter/cw_k8s_ci_v0_neuron:
        error_mode: ignore
        metrics:
            metric:
                - IsMatch(name, "^(neuron|execution_|hardware_ecc_)") != true
    filter/cw_k8s_ci_v0_scrape_metadata:
        error_mode: ignore
        metrics:
            metric:
                - IsMatch(name, "^(up|scrape_duration_seconds|scrape_samples_scraped|scrape_samples_post_metric_relabeling|scrape_series_added)$")
    groupbyattrs/cw_k8s_ci_v0_cadvisor:
        keys:
            - container
            - pod
            - namespace
    groupbyattrs/cw_k8s_ci_v0_dcgm:
        keys:
            - pod
            - namespace
            - container
    groupbyattrs/cw_k8s_ci_v0_ksm:
        keys:
            - pod
            - namespace
            - uid
            - node
            - container
            - owner_name
            - owner_kind
            - deployment
            - daemonset
            - statefulset
            - replicaset
            - job_name
            - cronjob
    groupbyattrs/cw_k8s_ci_v0_neuron:
        keys:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.container.name
    k8sattributes/cw_k8s_ci_v0_node:
        auth_type: serviceAccount
        exclude:
            pods: null
        extract:
            labels:
                - from: node
                  key_regex: (.*)
                  tag_name: k8s.node.label.$$$$1
            metadata:
                - k8s.node.name
        passthrough: false
        pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.node.name
    k8sattributes/cw_k8s_ci_v0_pod:
        auth_type: serviceAccount
        exclude:
            pods: null
        extract:
            labels:
                - from: pod
                  key_regex: (.*)
                  tag_name: k8s.pod.label.$$$$1
            metadata:
                - k8s.pod.uid
                - k8s.node.name
                - k8s.deployment.name
                - k8s.statefulset.name
                - k8s.daemonset.name
                - k8s.replicaset.name
                - k8s.job.name
                - k8s.cronjob.name
        passthrough: false
        pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.name
                - from: resource_attribute
                  name: k8s.namespace.name
    metricstarttime/cw_k8s_ci_v0: null
    nodemetadataenricher/cw_k8s_ci_v0: null
    resourcedetection/opentelemetry:
        aks:
            resource_attributes:
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                k8s.cluster.name:
                    enabled: false
        azure:
            resource_attributes:
                azure.resourcegroup.name:
                    enabled: true
                azure.vm.name:
                    enabled: true
                azure.vm.scaleset.name:
                    enabled: true
                azure.vm.size:
                    enabled: true
                cloud.account.id:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
            tags: []
        consul:
            address: ""
            datacenter: ""
            namespace: ""
            resource_attributes:
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
            token_file: ""
        detectors:
            - eks
            - env
            - ec2
        docker:
            resource_attributes:
                host.name:
                    enabled: true
                os.type:
                    enabled: true
        ec2:
            fail_on_missing_metadata: false
            max_attempts: 3
            max_backoff: 20s
            resource_attributes:
                cloud.account.id:
                    enabled: true
                cloud.availability_zone:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.image.id:
                    enabled: true
                host.name:
                    enabled: true
                host.type:
                    enabled: true
            tags:
                - ^kubernetes.io/cluster/.*$
                - ^aws:autoscaling:groupName
        ecs:
            resource_attributes:
                aws.ecs.cluster.arn:
                    enabled: true
                aws.ecs.launchtype:
                    enabled: true
                aws.ecs.task.arn:
                    enabled: true
                aws.ecs.task.family:
                    enabled: true
                aws.ecs.task.id:
                    enabled: true
                aws.ecs.task.revision:
                    enabled: true
                aws.log.group.arns:
                    enabled: true
                aws.log.group.names:
                    enabled: true
                aws.log.stream.arns:
                    enabled: true
                aws.log.stream.names:
                    enabled: true
                cloud.account.id:
                    enabled: true
                cloud.availability_zone:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
        eks:
            resource_attributes:
                cloud.account.id:
                    enabled: false
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                k8s.cluster.name:
                    enabled: false
        elasticbeanstalk:
            resource_attributes:
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                deployment.environment:
                    enabled: true
                service.instance.id:
                    enabled: true
                service.version:
                    enabled: true
        gcp:
            resource_attributes:
                cloud.account.id:
                    enabled: true
                cloud.availability_zone:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                faas.id:
                    enabled: true
                faas.instance:
                    enabled: true
                faas.name:
                    enabled: true
                faas.version:
                    enabled: true
                gcp.cloud_run.job.execution:
                    enabled: true
                gcp.cloud_run.job.task_index:
                    enabled: true
                gcp.gce.instance.hostname:
                    enabled: false
                gcp.gce.instance.name:
                    enabled: false
                gcp.gce.instance_group_manager.name:
                    enabled: true
                gcp.gce.instance_group_manager.region:
                    enabled: true
                gcp.gce.instance_group_manager.zone:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
                host.type:
                    enabled: true
                k8s.cluster.name:
                    enabled: true
        heroku:
            resource_attributes:
                cloud.provider:
                    enabled: true
                heroku.app.id:
                    enabled: true
                heroku.dyno.id:
                    enabled: true
                heroku.release.commit:
                    enabled: true
                heroku.release.creation_timestamp:
                    enabled: true
                service.instance.id:
                    enabled: true
                service.name:
                    enabled: true
                service.version:
                    enabled: true
        idle_conn_timeout: 1m30s
        k8snode:
            auth_type: serviceAccount
            context: ""
            kube_config_path: ""
            node_from_env_var: ""
            resource_attributes:
                k8s.node.name:
                    enabled: true
                k8s.node.uid:
                    enabled: true
        kubeadm:
            auth_type: serviceAccount
            context: ""
            kube_config_path: ""
            resource_attributes:
                k8s.cluster.name:
                    enabled: true
                k8s.cluster.uid:
                    enabled: true
        lambda:
            resource_attributes:
                aws.log.group.names:
                    enabled: true
                aws.log.stream.names:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                faas.instance:
                    enabled: true
                faas.max_memory:
                    enabled: true
                faas.name:
                    enabled: true
                faas.version:
                    enabled: true
        max_idle_conns: 100
        middleware: agenthealth/statuscode
        openshift:
            address: ""
            resource_attributes:
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                k8s.cluster.name:
                    enabled: true
            tls: {}
            token: ""
        override: true
        system:
            resource_attributes:
                host.arch:
                    enabled: false
                host.cpu.cache.l2.size:
                    enabled: false
                host.cpu.family:
                    enabled: false
                host.cpu.model.id:
                    enabled: false
                host.cpu.model.name:
                    enabled: false
                host.cpu.stepping:
                    enabled: false
                host.cpu.vendor.id:
                    enabled: false
                host.id:
                    enabled: false
                host.ip:
                    enabled: false
                host.mac:
                    enabled: false
                host.name:
                    enabled: true
                os.description:
                    enabled: false
                os.type:
                    enabled: true
                os.version:
                    enabled: false
        timeout: 2s
    resourcedetection/cw_k8s_ci_v0:
        detectors:
            - eks
            - env
            - ec2
        override: false
        timeout: 2s
    transform/cw_k8s_ci_v0_apiserver_cleanup_version:
        error_mode: ignore
        metric_statements:
            - context: resource
              statements:
                - delete_key(attributes, "k8s.apiserver.version") where attributes["k8s.apiserver.version"] != nil
    transform/cw_k8s_ci_v0_apiserver_extract_version:
        error_mode: ignore
        metric_statements:
            - context: datapoint
              statements:
                - set(resource.attributes["k8s.apiserver.version"], attributes["git_version"]) where attributes["git_version"] != nil and attributes["git_version"] != ""
    transform/cw_k8s_ci_v0_cadvisor_promote:
        error_mode: ignore
        metric_statements:
            - context: resource
              statements:
                - set(attributes["k8s.container.name"], attributes["container"]) where attributes["container"] != nil and attributes["container"] != ""
                - set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil
                - set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil
            - context: datapoint
              statements:
                - set(attributes["container"], resource.attributes["container"]) where resource.attributes["container"] != nil
                - set(attributes["pod"], resource.attributes["pod"]) where resource.attributes["pod"] != nil
                - set(attributes["namespace"], resource.attributes["namespace"]) where resource.attributes["namespace"] != nil
    transform/cw_k8s_ci_v0_clear_schema_url:
        error_mode: ignore
        metric_statements:
            - context: resource
              statements:
                - set(resource.schema_url, "")
    transform/cw_k8s_ci_v0_dcgm_promote:
        error_mode: ignore
        metric_statements:
            - context: resource
              statements:
                - set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil
                - set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil
                - set(attributes["k8s.container.name"], attributes["container"]) where attributes["container"] != nil
            - context: datapoint
              statements:
                - set(attributes["pod"], resource.attributes["pod"]) where resource.attributes["pod"] != nil
                - set(attributes["namespace"], resource.attributes["namespace"]) where resource.attributes["namespace"] != nil
                - set(attributes["container"], resource.attributes["container"]) where resource.attributes["container"] != nil
                - delete_key(attributes, "Hostname") where attributes["Hostname"] != nil
                - delete_key(attributes, "pci_bus_id") where attributes["pci_bus_id"] != nil
    transform/cw_k8s_ci_v0_ebs_csi_promote:
        error_mode: ignore
        metric_statements:
            - context: datapoint
              statements:
                - set(resource.attributes["instance_id"], attributes["instance_id"]) where attributes["instance_id"] != nil
                - set(resource.attributes["volume_id"], attributes["volume_id"]) where attributes["volume_id"] != nil
                - delete_key(attributes, "instance_id") where attributes["instance_id"] != nil
                - delete_key(attributes, "volume_id") where attributes["volume_id"] != nil
    transform/cw_k8s_ci_v0_efa_promote:
        error_mode: ignore
        metric_statements:
            - context: datapoint
              statements:
                - set(resource.attributes["k8s.pod.name"], attributes["k8s.pod.name"]) where attributes["k8s.pod.name"] != nil
                - set(resource.attributes["k8s.namespace.name"], attributes["k8s.namespace.name"]) where attributes["k8s.namespace.name"] != nil
                - set(resource.attributes["k8s.container.name"], attributes["k8s.container.name"]) where attributes["k8s.container.name"] != nil
                - delete_key(attributes, "k8s.pod.name") where attributes["k8s.pod.name"] != nil
                - delete_key(attributes, "k8s.namespace.name") where attributes["k8s.namespace.name"] != nil
                - delete_key(attributes, "k8s.container.name") where attributes["k8s.container.name"] != nil
    transform/cw_k8s_ci_v0_ksm_clean_resource:
        error_mode: ignore
        metric_statements:
            - context: resource
              statements:
                - delete_key(attributes, "k8s.pod.name")
                - delete_key(attributes, "k8s.pod.uid")
                - delete_key(attributes, "k8s.namespace.name")
                - delete_key(attributes, "k8s.node.name")
                - delete_key(attributes, "k8s.container.name")
                - delete_key(attributes, "k8s.deployment.name")
                - delete_key(attributes, "k8s.replicaset.name")
                - delete_key(attributes, "k8s.workload.name")
                - delete_key(attributes, "k8s.workload.type")
    transform/cw_k8s_ci_v0_ksm_promote:
        error_mode: ignore
        metric_statements:
            - context: resource
              statements:
                - set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil
                - set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil
                - set(attributes["k8s.node.name"], attributes["node"]) where attributes["node"] != nil
                - set(attributes["k8s.pod.uid"], attributes["uid"]) where attributes["uid"] != nil
                - set(attributes["k8s.container.name"], attributes["container"]) where attributes["container"] != nil
                - set(attributes["k8s.workload.name"], attributes["owner_name"]) where attributes["owner_name"] != nil
                - set(attributes["k8s.workload.type"], attributes["owner_kind"]) where attributes["owner_kind"] != nil
                - set(attributes["k8s.deployment.name"], attributes["deployment"]) where attributes["deployment"] != nil
                - set(attributes["k8s.daemonset.name"], attributes["daemonset"]) where attributes["daemonset"] != nil
                - set(attributes["k8s.statefulset.name"], attributes["statefulset"]) where attributes["statefulset"] != nil
                - set(attributes["k8s.job.name"], attributes["job_name"]) where attributes["job_name"] != nil
                - set(attributes["k8s.cronjob.name"], attributes["cronjob"]) where attributes["cronjob"] != nil
                - set(attributes["k8s.replicaset.name"], attributes["replicaset"]) where attributes["replicaset"] != nil
            - context: datapoint
              statements:
                - set(attributes["pod"], resource.attributes["pod"]) where resource.attributes["pod"] != nil
                - set(attributes["namespace"], resource.attributes["namespace"]) where resource.attributes["namespace"] != nil
                - set(attributes["node"], resource.attributes["node"]) where resource.attributes["node"] != nil
                - set(attributes["uid"], resource.attributes["uid"]) where resource.attributes["uid"] != nil
                - set(attributes["container"], resource.attributes["container"]) where resource.attributes["container"] != nil
                - set(attributes["deployment"], resource.attributes["deployment"]) where resource.attributes["deployment"] != nil
                - set(attributes["daemonset"], resource.attributes["daemonset"]) where resource.attributes["daemonset"] != nil
                - set(attributes["statefulset"], resource.attributes["statefulset"]) where resource.attributes["statefulset"] != nil
                - set(attributes["replicaset"], resource.attributes["replicaset"]) where resource.attributes["replicaset"] != nil
                - set(attributes["job_name"], resource.attributes["job_name"]) where resource.attributes["job_name"] != nil
                - set(attributes["cronjob"], resource.attributes["cronjob"]) where resource.attributes["cronjob"] != nil
                - set(attributes["owner_name"], resource.attributes["owner_name"]) where resource.attributes["owner_name"] != nil
                - set(attributes["owner_kind"], resource.attributes["owner_kind"]) where resource.attributes["owner_kind"] != nil
    transform/cw_k8s_ci_v0_lis_csi_promote:
        error_mode: ignore
        metric_statements:
            - context: datapoint
              statements:
                - set(resource.attributes["instance_id"], attributes["instance_id"]) where attributes["instance_id"] != nil
                - set(resource.attributes["volume_id"], attributes["volume_id"]) where attributes["volume_id"] != nil
                - delete_key(attributes, "instance_id") where attributes["instance_id"] != nil
                - delete_key(attributes, "volume_id") where attributes["volume_id"] != nil
    transform/cw_k8s_ci_v0_neuron_hw_attrs:
        error_mode: ignore
