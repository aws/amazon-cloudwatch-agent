                - delete_key(attributes, "neurondevice") where attributes["neurondevice"] != nil
                - delete_key(attributes, "instance_type") where attributes["instance_type"] != nil
    transform/cw_k8s_ci_v0_neuron_promote:
        error_mode: ignore
