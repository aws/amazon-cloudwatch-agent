service:
    extensions:
        - sigv4auth/monitoring
        - agenthealth/opentelemetry_metrics
        - sigv4auth/logs
        - awscloudwatchlogsprovisioner
        - headers_setter/logs
        - agenthealth/opentelemetry_logs
    pipelines:
        logs/dbi_mysql_0:
            exporters:
                - count/dbi_dbload_mysql
                - signaltometrics/dbi_topsql_mysql
            processors:
                - filter/dbi_exclude_monitor_mysql_0
            receivers:
                - mysql/metrics_0
        logs/dbi_mysql_rawevents_0:
            exporters:
                - forward/opentelemetry
            processors:
                - filter/dbi_exclude_monitor_mysql_0
                - transform/dbi_scope_mysql_0
                - resourcedetection/opentelemetry
                - transform/dbi_resource_mysql_0
                - transform/dbi_logs_mysql_raw-events_0
            receivers:
                - mysql/events_0
        logs/dbi_mysql_serverlogs_0:
            exporters:
                - forward/opentelemetry
            processors:
                - transform/dbi_scope_mysql_0
                - resourcedetection/opentelemetry
                - groupbyattrs/files
                - transform/dbi_resource_mysql_0
                - transform/dbi_logs_mysql_server-logs_0
            receivers:
                - filelog/mysql_0
        logs/opentelemetry:
            exporters:
                - otlphttp/logs
            processors:
                - resourcedetection/opentelemetry
                - transform/identity
                - transform/logs_routing
                - attributestocontext/opentelemetry
                - transform/logs_cleanup
                - batch/opentelemetry_logs
            receivers:
                - forward/opentelemetry
        metrics/dbi_mysql_0:
            exporters:
                - forward/opentelemetry
            processors:
                - transform/dbi_scope_mysql_0
                - transform/dbi_resource_mysql_0
                - transform/dbi_fix_start_time_mysql
            receivers:
                - mysql/metrics_0
                - count/dbi_dbload_mysql
                - signaltometrics/dbi_topsql_mysql
        metrics/host_metrics:
            exporters:
                - forward/opentelemetry
            processors:
                - transform/host_metrics_scope
            receivers:
                - hostmetrics/opentelemetry
        metrics/opentelemetry:
            exporters:
                - otlphttp/metrics
            processors:
                - resourcedetection/opentelemetry
                - transform/identity
                - batch/opentelemetry_metrics
            receivers:
                - forward/opentelemetry
    telemetry:
        logs:
            encoding: console
            level: info
            output_paths:
                - /opt/aws/amazon-cloudwatch-agent/logs/amazon-cloudwatch-agent.log
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
