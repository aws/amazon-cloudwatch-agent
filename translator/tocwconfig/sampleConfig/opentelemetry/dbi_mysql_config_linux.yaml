    filelog/mysql_0:
        encoding: utf-8
        include:
            - /var/log/mysql/mysql.log
        multiline:
            line_start_pattern: ^\d{4}-\d{2}-\d{2}
        operators:
            - regex: (?P<timestamp>\d{4}-\s{0,1}\d{1,2}-\s{0,1}\d{1,2}T\d{2}:\d{2}:\d{2}\.(\d{1,9})Z)
              timestamp:
                layout: 2006-1-_2T15:04:05.999999999Z
                layout_type: gotime
                location: UTC
                parse_from: attributes.timestamp
              type: regex_parser
            - on_error: send_quiet
              regex: \s\d+\s+\[(?P<severity>System|Warning|Note|ERROR)\]
              severity:
                mapping:
                    error: ERROR
                    info:
                        - System
                        - Note
                    warn: Warning
                parse_from: attributes.severity
              type: regex_parser
        start_at: end
