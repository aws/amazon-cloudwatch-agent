                    enabled: false
                host.ip:
                    enabled: false
                host.mac:
                    enabled: false
                host.name:
                    enabled: true
                os.description:
                    enabled: false
                os.type:
                    enabled: true
                os.version:
                    enabled: false
        timeout: 2s
    transform/dbi_fix_start_time_mysql:
        error_mode: ignore
        flatten_data: false
        log_statements: []
        metric_statements:
            - context: datapoint
              error_mode: ignore
              statements:
                - set(datapoint.start_time_unix_nano, datapoint.time_unix_nano) where datapoint.start_time_unix_nano == 0
                - replace_match(datapoint.attributes["mysql.wait_type"], "", "CPU")
                - replace_match(datapoint.attributes["network.peer.address"], "", "unknown")
                - replace_match(datapoint.attributes["mysql.events_statements_current.digest"], "", "unknown")
                - replace_match(datapoint.attributes["user.name"], "", "unknown")
        trace_statements: []
    transform/dbi_logs_mysql_raw-events_0:
        error_mode: ignore
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: ignore
              statements:
                - set(resource.attributes["aws.log.group.name"], "/aws/self-managed-database-insights/mysql/raw-events")
                - set(resource.attributes["aws.log.stream.name"], Concat([resource.attributes["host.id"], "pentest-mysql"], "/"))
        metric_statements: []
        trace_statements: []
    transform/dbi_logs_mysql_server-logs_0:
        error_mode: ignore
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: ignore
              statements:
                - set(resource.attributes["aws.log.group.name"], "/aws/self-managed-database-insights/mysql/server-logs")
                - set(resource.attributes["aws.log.stream.name"], Concat([resource.attributes["host.id"], "pentest-mysql"], "/"))
            - context: log
              error_mode: ignore
              statements:
                - delete_key(attributes, "timestamp")
                - delete_key(attributes, "severity")
        metric_statements: []
        trace_statements: []
    transform/dbi_resource_mysql_0:
        error_mode: ignore
        flatten_data: false
        log_statements:
            - context: resource
              error_mode: ignore
              statements:
                - set(resource.attributes["db.system.name"], "mysql")
                - set(resource.attributes["db.instance.name"], "pentest-mysql")
        metric_statements:
            - context: resource
              error_mode: ignore
              statements:
                - set(resource.attributes["db.system.name"], "mysql")
