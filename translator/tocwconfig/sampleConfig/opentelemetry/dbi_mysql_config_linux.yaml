connectors:
    count/dbi_dbload_mysql:
        datapoints:
            metric.datapoint.count:
                description: The number of data points observed.
        logs:
            mysql.active_sessions.by_db:
                attributes:
                    - key: db.system.name
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Active sessions by database
            mysql.active_sessions.by_host:
                attributes:
                    - key: db.system.name
                    - key: network.peer.address
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Active sessions by host
            mysql.active_sessions.by_sql:
                attributes:
                    - key: db.system.name
                    - key: mysql.events_statements_current.digest
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Active sessions by query digest
            mysql.active_sessions.by_sql_wait:
                attributes:
                    - key: db.system.name
                    - key: mysql.events_statements_current.digest
                    - key: mysql.wait_type
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Active sessions by query and wait
            mysql.active_sessions.by_user:
                attributes:
                    - key: db.system.name
                    - key: user.name
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Active sessions by user
            mysql.active_sessions.by_wait:
                attributes:
                    - key: db.system.name
                    - key: mysql.wait_type
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Active sessions by wait event
            mysql.active_sessions.count:
                attributes:
                    - key: db.system.name
                    - key: db.namespace
                conditions:
                    - attributes["mysql.session.status"] != "idle"
                description: Total active sessions
        metrics:
            metric.count:
                description: The number of metrics observed.
        spanevents:
            trace.span.event.count:
                description: The number of span events observed.
        spans:
            trace.span.count:
                description: The number of spans observed.
    forward/opentelemetry: {}
    signaltometrics/dbi_topsql_mysql:
        logs:
            - attributes:
                - key: db.system.name
                  optional: false
                - key: mysql.events_statements_summary_by_digest.digest
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["mysql.events_statements_summary_by_digest.count_star"] != nil
              description: SQL execution count
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: mysql.count_star
              sum:
                value: Int(attributes["mysql.events_statements_summary_by_digest.count_star"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: mysql.events_statements_summary_by_digest.digest
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["mysql.events_statements_summary_by_digest.sum_timer_wait"] != nil
              description: Total execution time in picoseconds
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: mysql.sum_timer_wait
              sum:
                value: Double(attributes["mysql.events_statements_summary_by_digest.sum_timer_wait"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: mysql.events_statements_summary_by_digest.digest
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["mysql.events_statements_summary_by_digest.sum_lock_time"] != nil
              description: Total lock time in seconds
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: mysql.sum_lock_time
              sum:
                value: Double(attributes["mysql.events_statements_summary_by_digest.sum_lock_time"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: mysql.events_statements_summary_by_digest.digest
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["mysql.events_statements_summary_by_digest.sum_rows_sent"] != nil
              description: Rows sent to client
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: mysql.sum_rows_sent
              sum:
                value: Int(attributes["mysql.events_statements_summary_by_digest.sum_rows_sent"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: mysql.events_statements_summary_by_digest.digest
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
