exporters:
    otlphttp/logs:
        auth:
            authenticator: agenthealth/opentelemetry_logs
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: https://logs.us-west-2.amazonaws.com/v1/logs
        max_idle_conns: 100
        metrics_endpoint: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
    otlphttp/metrics:
        auth:
            authenticator: agenthealth/opentelemetry_metrics
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: ""
        max_idle_conns: 100
        metrics_endpoint: https://monitoring.us-west-2.amazonaws.com/v1/metrics
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
extensions:
    agenthealth/opentelemetry_logs:
        additional_auth: headers_setter/logs
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EC2
                region_type: ACJ
    agenthealth/opentelemetry_metrics:
        additional_auth: sigv4auth/monitoring
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EC2
                region_type: ACJ
    awscloudwatchlogsprovisioner:
        additional_auth: sigv4auth/logs
        imds_retries: 1
        logs_provision_failure_backoff: 5s
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 10
    headers_setter/logs:
        additional_auth: awscloudwatchlogsprovisioner
        headers:
            - action: upsert
              from_context: aws.log.group.name
              key: x-aws-log-group
            - action: upsert
              from_context: aws.log.stream.name
              key: x-aws-log-stream
    sigv4auth/logs:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: logs
    sigv4auth/monitoring:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: monitoring
processors:
    attributestocontext/opentelemetry:
        actions:
            - from_resource_attribute: aws.log.group.name
              key: aws.log.group.name
            - from_resource_attribute: aws.log.stream.name
              key: aws.log.stream.name
    batch/opentelemetry_logs:
        metadata_cardinality_limit: 1000
        metadata_keys:
            - aws.log.group.name
            - aws.log.stream.name
        send_batch_max_size: 10000
        send_batch_size: 10000
        timeout: 30s
    batch/opentelemetry_metrics:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 1000
        send_batch_size: 1000
        timeout: 30s
    filter/dbi_exclude_monitor_mysql_0:
        error_mode: propagate
        logs:
            log_record:
                - attributes["user.name"] == "cw_monitor"
        metrics: {}
        spans: {}
        traces: {}
    groupbyattrs/files:
        keys:
            - log.file.name
    resourcedetection/opentelemetry:
        aks:
            resource_attributes:
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                k8s.cluster.name:
                    enabled: false
        azure:
            resource_attributes:
                azure.resourcegroup.name:
                    enabled: true
                azure.vm.name:
                    enabled: true
                azure.vm.scaleset.name:
                    enabled: true
                azure.vm.size:
                    enabled: true
                cloud.account.id:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
            tags: []
        consul:
            address: ""
            datacenter: ""
            namespace: ""
            resource_attributes:
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
            token_file: ""
        detectors:
            - eks
            - env
            - ec2
        docker:
