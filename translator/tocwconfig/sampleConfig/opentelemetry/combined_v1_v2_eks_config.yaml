connectors:
    count/dbi_dbload:
        datapoints:
            metric.datapoint.count:
                description: The number of data points observed.
        logs:
            postgresql.active_sessions.by_app:
                attributes:
                    - key: db.system.name
                    - key: postgresql.application_name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by application
            postgresql.active_sessions.by_db:
                attributes:
                    - key: db.system.name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by database
            postgresql.active_sessions.by_host:
                attributes:
                    - key: db.system.name
                    - key: network.peer.address
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by host
            postgresql.active_sessions.by_sql:
                attributes:
                    - key: db.system.name
                    - key: postgresql.query_id
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by query
            postgresql.active_sessions.by_sql_wait:
                attributes:
                    - key: db.system.name
                    - key: postgresql.query_id
                    - key: postgresql.wait_event_type
                    - key: postgresql.wait_event
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by query and wait
            postgresql.active_sessions.by_user:
                attributes:
                    - key: db.system.name
                    - key: user.name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by user
            postgresql.active_sessions.by_wait:
                attributes:
                    - key: db.system.name
                    - key: postgresql.wait_event_type
                    - key: postgresql.wait_event
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Active sessions by wait event
            postgresql.active_sessions.count:
                attributes:
                    - key: db.system.name
                    - key: db.namespace
                conditions:
                    - attributes["postgresql.state"] == "active"
                description: Total active sessions
        metrics:
            metric.count:
                description: The number of metrics observed.
        spanevents:
            trace.span.event.count:
                description: The number of span events observed.
        spans:
            trace.span.count:
                description: The number of spans observed.
    forward/opentelemetry: {}
    signaltometrics/dbi_topsql:
        logs:
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
                - key: postgresql.rolname
                  optional: false
              conditions:
                - attributes["postgresql.calls"] != nil
              description: SQL execution count
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.calls
              sum:
                value: Int(attributes["postgresql.calls"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
                - key: postgresql.rolname
                  optional: false
              conditions:
                - attributes["postgresql.total_exec_time"] != nil
              description: Total execution time in ms
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.total_exec_time
              sum:
                value: Double(attributes["postgresql.total_exec_time"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
                - key: postgresql.rolname
                  optional: false
              conditions:
                - attributes["postgresql.total_plan_time"] != nil
              description: Total plan time in ms
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.total_plan_time
              sum:
                value: Double(attributes["postgresql.total_plan_time"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
                - key: postgresql.rolname
                  optional: false
              conditions:
                - attributes["postgresql.rows"] != nil
              description: Rows affected
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.rows
              sum:
                value: Int(attributes["postgresql.rows"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["postgresql.shared_blks_hit"] != nil
              description: Shared blocks hit
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.shared_blks_hit
              sum:
                value: Int(attributes["postgresql.shared_blks_hit"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["postgresql.shared_blks_read"] != nil
              description: Shared blocks read
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.shared_blks_read
              sum:
                value: Int(attributes["postgresql.shared_blks_read"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["postgresql.local_blks_hit"] != nil
              description: Local blocks hit
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.local_blks_hit
              sum:
                value: Int(attributes["postgresql.local_blks_hit"])
              unit: ""
            - attributes:
                - key: db.system.name
                  optional: false
                - key: postgresql.queryid
                  optional: false
                - key: db.namespace
                  optional: false
              conditions:
                - attributes["postgresql.local_blks_read"] != nil
              description: Local blocks read
              include_resource_attributes:
                - key: service.instance.id
                  optional: false
              name: postgresql.local_blks_read
              sum:
                value: Int(attributes["postgresql.local_blks_read"])
              unit: ""
exporters:
    awscloudwatch:
        backoff_retry_base: 200ms
        endpoint_override: https://monitoring-fips.us-west-2.amazonaws.com
        force_flush_interval: 1m0s
        max_concurrent_publishers: 10
        max_datums_per_call: 1000
        max_retry_count: 5
        max_values_per_datum: 150
        middleware: agenthealth/metrics
        namespace: CWAgent
        region: us-west-2
        resource_to_telemetry_conversion:
            enabled: true
        role_arn: metrics_role_arn_value_test
        rollup_dimensions:
            - - InstanceId
              - InstanceType
            - []
    awscloudwatchlogs/emf_logs:
        certificate_file_path: ""
        emf_only: true
        endpoint: https://logs-fips.us-west-2.amazonaws.com
        external_id: ""
        imds_retries: 1
        local_mode: false
        log_group_name: emf/logs/default
        log_retention: 0
        log_stream_name: LOG_STREAM_NAME
        max_retries: 2
        middleware: agenthealth/logs
        no_verify_ssl: false
        num_workers: 8
        profile: ""
        proxy_address: ""
        raw_log: true
        region: us-west-2
        request_timeout_seconds: 30
        resource_arn: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        role_arn: log_role_arn_value_test
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 1
            queue_size: 1000
            sizer: {}
            wait_for_result: false
    awsxray:
        certificate_file_path: ""
        endpoint: https://x-ray-endpoint.us-west-2.amazonaws.com
        external_id: ""
        imds_retries: 1
        index_all_attributes: false
        local_mode: false
        max_retries: 2
        middleware: agenthealth/traces
        no_verify_ssl: true
        num_workers: 1
        profile: ""
        proxy_address: ""
        region: us-west-2
        request_timeout_seconds: 30
        resource_arn: ""
        role_arn: trace_role_arn_value_test
        telemetry:
            enabled: true
            include_metadata: true
    otlphttp/logs:
        auth:
            authenticator: agenthealth/opentelemetry_logs
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: https://logs.us-west-2.amazonaws.com/v1/logs
        max_idle_conns: 100
        metrics_endpoint: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
    otlphttp/metrics:
        auth:
            authenticator: agenthealth/opentelemetry_metrics
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: ""
        max_idle_conns: 100
        metrics_endpoint: https://monitoring.us-west-2.amazonaws.com/v1/metrics
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: ""
        write_buffer_size: 524288
    otlphttp/traces:
        auth:
            authenticator: agenthealth/opentelemetry_traces
        compression: gzip
        encoding: proto
        idle_conn_timeout: 1m30s
        logs_endpoint: ""
        max_idle_conns: 100
        metrics_endpoint: ""
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            block_on_overflow: false
            blocking: false
            enabled: true
            num_consumers: 10
            queue_size: 1000
            sizer: {}
            wait_for_result: false
        timeout: 30s
        traces_endpoint: https://xray.us-west-2.amazonaws.com/v1/traces
        write_buffer_size: 524288
extensions:
    agenthealth/logs:
        is_usage_data_enabled: true
        stats:
            operations:
                - PutLogEvents
            usage_flags:
                mode: EKS
                region_type: ACJ
    agenthealth/metrics:
        is_usage_data_enabled: true
        stats:
            operations:
                - PutMetricData
            usage_flags:
                mode: EKS
                region_type: ACJ
    agenthealth/opentelemetry_logs:
        additional_auth: headers_setter/logs
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EKS
                region_type: ACJ
    agenthealth/opentelemetry_metrics:
        additional_auth: sigv4auth/monitoring
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EKS
                region_type: ACJ
    agenthealth/opentelemetry_traces:
        additional_auth: sigv4auth/xray
        is_usage_data_enabled: true
        stats:
            operations:
                - '*'
            usage_flags:
                mode: EKS
                region_type: ACJ
    agenthealth/statuscode:
        is_status_code_enabled: true
        is_usage_data_enabled: true
        stats:
            usage_flags:
                mode: EKS
                region_type: ACJ
    agenthealth/traces:
        is_usage_data_enabled: true
        stats:
            operations:
                - PutTraceSegments
            usage_flags:
                mode: EKS
                region_type: ACJ
    awscloudwatchlogsprovisioner:
        additional_auth: sigv4auth/logs
        imds_retries: 1
        logs_provision_failure_backoff: 30s
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 10
    entitystore:
        kubernetes_mode: EKS
        mode: ec2
        region: us-west-2
    headers_setter/logs:
        additional_auth: awscloudwatchlogsprovisioner
        headers:
            - action: upsert
              from_context: aws.log.group.name
              key: x-aws-log-group
            - action: upsert
              from_context: aws.log.stream.name
              key: x-aws-log-stream
    nodemetadatacache/cw_k8s_ci_v0:
        namespace: amazon-cloudwatch
    server:
        listen_addr: :4311
        tls_ca_path: /etc/amazon-cloudwatch-observability-agent-client-cert/tls-ca.crt
        tls_cert_path: /etc/amazon-cloudwatch-observability-agent-server-cert/server.crt
        tls_key_path: /etc/amazon-cloudwatch-observability-agent-server-cert/server.key
    sigv4auth/logs:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: logs
    sigv4auth/monitoring:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: monitoring
    sigv4auth/xray:
        assume_role: {}
        imds_retries: 1
        max_retries: 2
        num_workers: 8
        region: us-west-2
        request_timeout_seconds: 30
        service: xray
processors:
    attributestocontext/opentelemetry:
        actions:
            - from_resource_attribute: aws.log.group.name
              key: aws.log.group.name
            - from_resource_attribute: aws.log.stream.name
              key: aws.log.stream.name
    awsattributelimit/cw_k8s_ci_v0:
        max_total_attributes: 150
        unconditional_removal_keys:
            - k8s.node.label.topology.kubernetes.io/region
            - k8s.node.label.topology.kubernetes.io/zone
            - k8s.node.label.topology.ebs.csi.aws.com/zone
            - k8s.node.label.node.kubernetes.io/instance-type
            - k8s.node.label.kubernetes.io/hostname
            - k8s.node.label.helm.sh/chart
            - k8s.node.label.release
            - k8s.node.label.eks.amazonaws.com/nodegroup-image
            - k8s.node.label.k8s.io/cloud-provider-aws
            - k8s.node.label.eks.amazonaws.com/sourceLaunchTemplateId
            - k8s.node.label.eks.amazonaws.com/sourceLaunchTemplateVersion
            - k8s.pod.label.pod-template-hash
            - k8s.pod.label.controller-revision-hash
        unconditional_removal_prefixes:
            - k8s.node.label.feature.node.kubernetes.io/
            - k8s.node.label.beta.kubernetes.io/
            - k8s.node.label.failure-domain.beta.kubernetes.io/
            - k8s.node.label.alpha.eksctl.io/
    awsdevicepodcorrelation/cw_k8s_ci_v0:
        device_types:
            - device_id_attribute: neuroncore
              name: neuron-by-core
              resource_names:
                - aws.amazon.com/neuroncore
            - device_id_attribute: neurondevice
              name: neuron-by-device
              resource_names:
                - aws.amazon.com/neurondevice
                - aws.amazon.com/neuron
            - device_id_attribute: aws.efa.device
              name: efa
              resource_names:
                - vpc.amazonaws.com/efa
    awsentity/resource:
        entity_type: Resource
        kubernetes_mode: EKS
        platform: ec2
        scrape_datapoint_attribute: true
    awsentity/service/telegraf:
        entity_type: Service
        kubernetes_mode: EKS
        platform: ec2
        scrape_datapoint_attribute: true
    awsneuron/cw_k8s_ci_v0: null
    batch/emf_logs:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 0
        send_batch_size: 8192
        timeout: 1m0s
    batch/opentelemetry:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 10000
        send_batch_size: 10000
        timeout: 15s
    batch/opentelemetry_logs:
        metadata_cardinality_limit: 1000
        metadata_keys:
            - aws.log.group.name
            - aws.log.stream.name
        send_batch_max_size: 10000
        send_batch_size: 10000
        timeout: 15s
    batch/xray:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 0
        send_batch_size: 8192
        timeout: 200ms
    cumulativetodelta/hostDeltaMetrics:
        exclude:
            match_type: strict
            metrics:
                - iops_in_progress
                - diskio_iops_in_progress
                - diskio_ebs_volume_queue_length
        include:
            match_type: ""
        initial_value: 2
        max_staleness: 0s
    ec2tagger:
        ec2_instance_tag_keys:
            - AutoScalingGroupName
        ec2_metadata_tags:
            - ImageId
            - InstanceId
            - InstanceType
        imds_retries: 1
        middleware: agenthealth/statuscode
        refresh_tags_interval: 0s
        refresh_volumes_interval: 0s
    filter/cw_k8s_ci_v0_apiserver_build_info:
        error_mode: ignore
        metrics:
            metric:
                - name == "kubernetes_build_info"
    filter/cw_k8s_ci_v0_cadvisor_empty:
        error_mode: ignore
        metrics:
            datapoint:
                - attributes["container"] == "" and attributes["pod"] == ""
                - attributes["container"] == "" and attributes["pod"] == nil
                - attributes["container"] == nil and attributes["pod"] == ""
                - attributes["container"] == nil and attributes["pod"] == nil
    filter/cw_k8s_ci_v0_cadvisor_pod:
        error_mode: ignore
        metrics:
            datapoint:
                - attributes["container"] == "POD"
    filter/cw_k8s_ci_v0_neuron:
        error_mode: ignore
        metrics:
            metric:
                - IsMatch(name, "^(neuron|execution_|hardware_ecc_)") != true
    filter/cw_k8s_ci_v0_scrape_metadata:
        error_mode: ignore
        metrics:
            metric:
                - IsMatch(name, "^(up|scrape_duration_seconds|scrape_samples_scraped|scrape_samples_post_metric_relabeling|scrape_series_added)$")
    filter/dbi_exclude_monitor_0:
        error_mode: propagate
        logs:
            log_record:
                - attributes["user.name"] == "cw_monitor" or attributes["postgresql.rolname"] == "cw_monitor"
        metrics: {}
        spans: {}
        traces: {}
    groupbyattrs/cw_k8s_ci_v0_cadvisor:
        keys:
            - container
            - pod
            - namespace
    groupbyattrs/cw_k8s_ci_v0_dcgm:
        keys:
            - pod
            - namespace
            - container
    groupbyattrs/cw_k8s_ci_v0_ksm:
        keys:
            - pod
            - namespace
            - uid
            - node
            - container
            - owner_name
            - owner_kind
            - deployment
            - daemonset
            - statefulset
            - replicaset
            - job_name
            - cronjob
    groupbyattrs/cw_k8s_ci_v0_neuron:
        keys:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.container.name
    k8sattributes/cw_k8s_ci_v0_node:
        auth_type: serviceAccount
        exclude:
            pods: null
        extract:
            labels:
                - from: node
                  key_regex: (.*)
                  tag_name: k8s.node.label.$$$$1
            metadata:
                - k8s.node.name
        passthrough: false
        pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.node.name
    k8sattributes/cw_k8s_ci_v0_pod:
        auth_type: serviceAccount
        exclude:
            pods: null
        extract:
            labels:
                - from: pod
                  key_regex: (.*)
                  tag_name: k8s.pod.label.$$$$1
            metadata:
                - k8s.pod.uid
                - k8s.node.name
                - k8s.deployment.name
                - k8s.statefulset.name
                - k8s.daemonset.name
                - k8s.replicaset.name
                - k8s.job.name
                - k8s.cronjob.name
        passthrough: false
        pod_association:
            - sources:
                - from: resource_attribute
                  name: k8s.pod.name
                - from: resource_attribute
                  name: k8s.namespace.name
    metricstarttime/cw_k8s_ci_v0: null
    nodemetadataenricher/cw_k8s_ci_v0: null
    resourcedetection/cw_k8s_ci_v0:
        detectors:
            - eks
            - env
            - ec2
        override: false
        timeout: 2s
    resourcedetection/opentelemetry:
        aks:
            resource_attributes:
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                k8s.cluster.name:
                    enabled: false
        azure:
            resource_attributes:
                azure.resourcegroup.name:
                    enabled: true
                azure.vm.name:
                    enabled: true
                azure.vm.scaleset.name:
                    enabled: true
                azure.vm.size:
                    enabled: true
                cloud.account.id:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
            tags: []
        consul:
            address: ""
            datacenter: ""
            namespace: ""
            resource_attributes:
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.name:
                    enabled: true
            token_file: ""
        detectors:
            - eks
            - env
            - ec2
        docker:
            resource_attributes:
                host.name:
                    enabled: true
                os.type:
                    enabled: true
        ec2:
            fail_on_missing_metadata: false
            max_attempts: 3
            max_backoff: 20s
            resource_attributes:
                cloud.account.id:
                    enabled: true
                cloud.availability_zone:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
                host.id:
                    enabled: true
                host.image.id:
                    enabled: true
                host.name:
                    enabled: true
                host.type:
                    enabled: true
            tags:
                - ^kubernetes.io/cluster/.*$
                - ^aws:autoscaling:groupName
        ecs:
            resource_attributes:
                aws.ecs.cluster.arn:
                    enabled: true
                aws.ecs.launchtype:
                    enabled: true
                aws.ecs.task.arn:
                    enabled: true
                aws.ecs.task.family:
                    enabled: true
                aws.ecs.task.id:
                    enabled: true
                aws.ecs.task.revision:
                    enabled: true
                aws.log.group.arns:
                    enabled: true
                aws.log.group.names:
                    enabled: true
                aws.log.stream.arns:
                    enabled: true
                aws.log.stream.names:
                    enabled: true
                cloud.account.id:
                    enabled: true
                cloud.availability_zone:
                    enabled: true
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                cloud.region:
                    enabled: true
        eks:
            resource_attributes:
                cloud.account.id:
                    enabled: false
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                k8s.cluster.name:
                    enabled: false
        elasticbeanstalk:
            resource_attributes:
                cloud.platform:
                    enabled: true
                cloud.provider:
                    enabled: true
                deployment.environment:
                    enabled: true
                service.instance.id:
                    enabled: true
                service.version:
                    enabled: true
