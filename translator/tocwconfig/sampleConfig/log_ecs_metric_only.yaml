exporters:
    awscloudwatchlogs/emf_logs:
        emf_only: true
        endpoint: https://fake_endpoint
        imds_retries: 1
        log_group_name: emf/logs/default
        log_retention: 0
        log_stream_name: arn_aws_ecs_us-east-1_account_id_task/task_id
        max_retries: 2
        middleware: agenthealth/logs
        num_workers: 8
        raw_log: true
        region: us-west-2
        request_timeout_seconds: 30
        retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_elapsed_time: 5m0s
            max_interval: 30s
            multiplier: 1.5
            randomization_factor: 0.5
        sending_queue:
            batch: null
            block_on_overflow: false
            num_consumers: 1
            queue_size: 1000
            sizer: null
            storage: null
            wait_for_result: false
    awsemf/containerinsights:
        add_entity: false
        detailed_metrics: false
        dimension_rollup_option: NoDimensionRollup
        disable_metric_extraction: false
        eks_fargate_container_insights_enabled: false
        endpoint: https://fake_endpoint
        enhanced_container_insights: false
        imds_retries: 1
        log_group_name: /aws/ecs/containerinsights/{ClusterName}/performance
        log_retention: 0
        log_stream_name: NodeTelemetry-{ContainerInstanceId}
        max_retries: 2
        metric_declarations:
            - dimensions:
                - - ClusterName
                  - ContainerInstanceId
                  - InstanceId
              metric_name_selectors:
                - instance_cpu_reserved_capacity
                - instance_cpu_utilization
                - instance_filesystem_utilization
                - instance_memory_reserved_capacity
                - instance_memory_utilization
                - instance_network_total_bytes
                - instance_number_of_running_tasks
            - dimensions:
                - - ClusterName
              metric_name_selectors:
                - instance_cpu_limit
                - instance_cpu_reserved_capacity
                - instance_cpu_usage_total
                - instance_cpu_utilization
                - instance_filesystem_utilization
                - instance_memory_limit
                - instance_memory_reserved_capacity
                - instance_memory_utilization
                - instance_memory_working_set
                - instance_network_total_bytes
                - instance_number_of_running_tasks
        middleware: agenthealth/logs
        namespace: ECS/ContainerInsights
        num_workers: 8
        output_destination: cloudwatch
        parse_json_encoded_attr_values:
            - Sources
        region: us-west-2
        request_timeout_seconds: 30
        resource_to_telemetry_conversion:
            enabled: true
            exclude_service_attributes: false
        retain_initial_value_of_delta_metric: false
        version: "0"
extensions:
    agenthealth/logs:
        is_usage_data_enabled: true
        stats:
            operations:
                - PutLogEvents
            usage_flags:
                mode: EC2
                region_type: ACJ
    agenthealth/statuscode:
        is_status_code_enabled: true
        is_usage_data_enabled: true
        stats:
            usage_flags:
                mode: EC2
                region_type: ACJ
processors:
    batch/containerinsights:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 0
        send_batch_size: 8192
        timeout: 5s
    batch/emf_logs:
        metadata_cardinality_limit: 1000
        send_batch_max_size: 0
        send_batch_size: 8192
        timeout: 5s
    filter/containerinsights:
        error_mode: propagate
        logs: {}
        metrics:
            exclude:
                match_type: strict
                metric_names:
                    - up
                    - scrape_duration_seconds
                    - scrape_samples_scraped
                    - scrape_series_added
                    - scrape_samples_post_metric_relabeling
        profiles: {}
        spans: {}
        traces: {}
receivers:
    awscontainerinsightreceiver:
        accelerated_compute_metrics: true
        accelerated_compute_gpu_metrics_collection_interval: 1m0s
        add_container_name_metric_label: false
        add_full_pod_name_metric_label: false
        add_service_as_attribute: true
        cluster_name: ""
        collection_interval: 30s
        collection_role: ALL
        container_orchestrator: ecs
        enable_control_plane_metrics: false
        host_ip: ""
        host_name: ""
        imds_retries: 1
        kube_config_path: ""
        leader_lock_name: otel-container-insight-clusterleader
        leader_lock_using_config_map_only: false
        max_retries: 0
        middleware: agenthealth/statuscode
        num_workers: 0
        prefer_full_pod_name: false
        region: us-west-2
        request_timeout_seconds: 0
    tcp_log/emf_logs:
        encoding: utf-8
        id: tcp_input
        listen_address: 0.0.0.0:25888
        operators: []
        retry_on_failure:
            enabled: false
            initial_interval: 1s
            max_elapsed_time: 5m0s
            max_interval: 30s
        type: tcp_input
    udp_log/emf_logs:
        encoding: utf-8
        id: udp_input
        listen_address: 0.0.0.0:25888
        multiline:
            line_end_pattern: .^
            line_start_pattern: ""
            omit_pattern: false
        operators: []
        retry_on_failure:
            enabled: false
            initial_interval: 0s
            max_elapsed_time: 0s
            max_interval: 0s
        type: udp_input
service:
    extensions:
        - agenthealth/logs
        - agenthealth/statuscode
    pipelines:
        logs/emf_logs:
            exporters:
                - awscloudwatchlogs/emf_logs
            processors:
                - batch/emf_logs
            receivers:
                - tcp_log/emf_logs
                - udp_log/emf_logs
        metrics/containerinsights:
            exporters:
                - awsemf/containerinsights
            processors:
                - batch/containerinsights
                - filter/containerinsights
            receivers:
                - awscontainerinsightreceiver
    telemetry:
        logs:
            encoding: console
            error_output_paths: null
            level: info
            output_paths: null
            sampling:
                enabled: true
                initial: 2
                thereafter: 500
                tick: 10s
        metrics:
            level: None
        traces:
            level: None
            propagators: null
