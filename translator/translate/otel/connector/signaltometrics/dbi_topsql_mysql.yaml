logs:
  - name: mysql.count_star
    include_resource_attributes:
      - key: service.instance.id
    description: "SQL execution count"
    attributes:
      - key: db.system.name
      - key: mysql.events_statements_summary_by_digest.digest
      - key: db.namespace
    conditions:
      - attributes["mysql.events_statements_summary_by_digest.count_star"] != nil
    sum:
      value: 'Int(attributes["mysql.events_statements_summary_by_digest.count_star"])'
  - name: mysql.sum_timer_wait
